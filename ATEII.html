<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ATEII – Atención actual vs propuesta</title>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- PapaParse (CSV) -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<!-- Turf.js (geo utilidades) -->
<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6.5.0/turf.min.js"></script>

<style>
  :root{
    --bg:#0f172a;          /* slate-900 */
    --card:#111827;        /* gray-900 */
    --muted:#94a3b8;       /* slate-400 */
    --text:#e5e7eb;        /* gray-200 */
    --line:#1f2937;        /* gray-800 */
    --brand:#60a5fa;       /* blue-400 */
  }
  body{
    margin:0; font-family:system-ui, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    background:var(--bg); color:var(--text);
  }
  header{
    padding:10px 14px; border-bottom:1px solid var(--line);
    display:flex; gap:14px; align-items:center; flex-wrap:wrap;
    background:linear-gradient(180deg, #0b1221 0%, #0f172a 100%);
    position:sticky; top:0; z-index:1000;
  }
  h1{ font-size:16px; margin:0; letter-spacing:.2px; }
  .muted{ color:var(--muted); font-size:12px; }
  .controls{
    display:flex; gap:10px; align-items:center; flex-wrap:wrap;
  }
  .group{ display:flex; gap:6px; align-items:center; padding:6px 8px; background:var(--card); border:1px solid var(--line); border-radius:10px; }
  .segmented{
    display:flex; overflow:hidden; border-radius:8px; border:1px solid var(--line);
  }
  .segmented button{
    background:#0b1221; color:var(--text); border:0; padding:6px 10px; cursor:pointer; font-weight:600;
  }
  .segmented button.active{ background:var(--brand); color:#0b1221; }
  .segmented button + button{ border-left:1px solid var(--line); }
  label.switch{ display:inline-flex; align-items:center; gap:8px; cursor:pointer; user-select:none; }
  .toggle{
    width:44px; height:24px; background:#111827; border:1px solid var(--line); border-radius:999px; position:relative; transition:.2s;
  }
  .knob{ width:20px; height:20px; background:white; border-radius:50%; position:absolute; top:1px; left:1px; transition:.2s; }
  input[type="checkbox"].toggle-input{ display:none; }
  input[type="checkbox"].toggle-input:checked + .toggle{ background:#16a34a; }
  input[type="checkbox"].toggle-input:checked + .toggle .knob{ left:23px; }
  #map{ height: calc(100vh - 92px); }
  .legend{
    position:absolute; bottom:12px; left:12px; z-index:600; background:var(--card);
    border:1px solid var(--line); border-radius:10px; padding:10px; font-size:13px;
  }
  .legend h4{ margin:0 0 6px 0; font-size:13px; }
  .legend .row{ display:flex; align-items:center; gap:8px; margin:4px 0; }
  .swatch{ width:12px; height:12px; border-radius:2px; border:1px solid #0003; }
  .pill{ font-size:11px; padding:2px 6px; border:1px solid var(--line); border-radius:999px; color:var(--muted);}
  a, a:visited{ color:#93c5fd; text-decoration:none; }
  a:hover{ text-decoration:underline; }
  .btn{ padding:6px 10px; border:1px solid var(--line); background:var(--card); color:var(--text); border-radius:8px; cursor:pointer;}
  .freq{ display:inline-block; font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; font-weight:700; font-size:12px; background:#0b1221; color:#c7d2fe; padding:2px 6px; border-radius:6px; border:1px solid #111827;}
</style>
</head>
<body>

<header>
  <div style="display:flex; flex-direction:column;">
    <h1>ATEII · Mapa de atención</h1>
    <div class="muted">
      CSV: raw GitHub (Catálogo Sigma) · GeoJSON: distritos (RoadMap)
    </div>
  </div>

  <div class="controls">
    <div class="group">
      <label class="switch" title="Cambiar entre Atención actual y Propuesta">
        <span>Actual</span>
        <input id="viewToggle" class="toggle-input" type="checkbox" />
        <span class="toggle"><span class="knob"></span></span>
        <span>Propuesta</span>
      </label>
    </div>

    <div class="group">
      <strong style="font-size:12px;">Día:</strong>
      <div id="dayFilter" class="segmented" role="tablist" aria-label="Filtro de día">
        <button data-day="Todos" class="active">Todos</button>
        <button data-day="Lunes">L</button>
        <button data-day="Martes">M</button>
        <button data-day="Miércoles">X</button>
        <button data-day="Jueves">J</button>
        <button data-day="Viernes">V</button>
        <button data-day="Sábado">S</button>
      </div>
    </div>

    <div class="group">
      <strong style="font-size:12px;">Oficinas:</strong>
      <label><input type="checkbox" id="oficAte" checked> <span class="pill">Ofic Ate</span></label>
      <label><input type="checkbox" id="oficChorri" checked> <span class="pill">Ofic Chorrillos</span></label>
    </div>

    <div class="group">
      <label class="switch" title="Mostrar/Ocultar marcadores">
        <span>Marcadores</span>
        <input id="markersToggle" class="toggle-input" type="checkbox" checked />
        <span class="toggle"><span class="knob"></span></span>
      </label>
    </div>

    <div class="group">
      <button id="fitBtn" class="btn" title="Ajustar a puntos y zonas visibles">Ajustar vista</button>
    </div>
  </div>
</header>

<div id="map" role="application" aria-label="Mapa Leaflet de atención a clientes"></div>

<div class="legend" id="legend"></div>

<script>
(function(){
  const CSV_URL = "https://raw.githubusercontent.com/sigmaperu/MapInfo/main/Catalogo%20Sigma.csv";
  const GEOJSON_URL = "https://raw.githubusercontent.com/sigmaperu/RoadMap/main/Distritos.geojson";

  // ====== Catálogos y configuración ======
  const OFFICES = new Set(["OFIC ATE","OFIC CHORRILLOS"]);

  // Excluir distritos + exclusión por código (caso Mi Perú)
  const EXCLUDE_DISTRICTS = new Set([
    "ANCON","ANCÓN","MI PERU","MI PERÚ","SANTA ROSA","VENTANILLA","PUENTE PIEDRA","CARABAYLLO"
  ].map(s => normalize(s)));
  const EXCLUDE_CODES = new Set(["11747415"]);

  // Filtros adicionales
  const EXCLUDE_CANAL = "MOD";          // col[21]
  const EXCLUDE_INTERLOC = "211087";    // col[26]

  // Mapeo días
  const dayLetterToName = { "L":"Lunes", "M":"Martes", "X":"Miércoles", "J":"Jueves", "V":"Viernes", "S":"Sábado" };
  const dayNameToLetter = { "Lunes":"L", "Martes":"M", "Miércoles":"X", "Jueves":"J", "Viernes":"V", "Sábado":"S" };

  // Colores por día (Actual)
  const dayColors = {
    "Lunes":"#2563eb", "Martes":"#16a34a", "Miércoles":"#7c3aed",
    "Jueves":"#f59e0b", "Viernes":"#0ea5e9", "Sábado":"#dc2626"
  };

  // Propuesta por partes
  const partToDays = { "A":["Lunes","Jueves"], "B":["Martes","Viernes"], "C":["Miércoles","Sábado"] };
  const partToFreqLetters = { "A":"LJ", "B":"MV", "C":"XS" };
  const partColors = { "A":"#1f78b4", "B":"#33a02c", "C":"#6a3d9a" };
  const partFill   = { "A":"#1f78b4", "B":"#33a02c", "C":"#6a3d9a" };

  // ====== Estado UI ======
  let viewMode = "Actual";            // "Actual" | "Propuesta"
  let selectedDay = "Todos";          // "Todos" o nombre de día
  let filterOffices = new Set(["OFIC ATE","OFIC CHORRILLOS"]);
  let showMarkers = true;

  // ====== Mapa y PANES (polígonos debajo de marcadores) ======
  const map = L.map('map', { preferCanvas:true });
  map.createPane('zonesPane');   map.getPane('zonesPane').style.zIndex = 300;   // zonas debajo
  map.createPane('markersPane'); map.getPane('markersPane').style.zIndex = 600; // marcadores encima

  const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution:'&copy; OpenStreetMap'
  }).addTo(map);

  // Capas
  const currentLayer  = L.layerGroup().addTo(map);                               // markers actuales
  const proposedLayer = L.layerGroup();                                          // markers propuestos
  const boundaryLayer = L.geoJSON(null, { pane:'zonesPane', style: { color:'#ef4444', weight:1, fill:false } }).addTo(map);
  const partPolysLayer = L.layerGroup().addTo(map);                              // polígonos de partes (debajo)

  // ====== Datos ======
  let areaFeatures = null; // FeatureCollection
  let records = [];        // {code,name,distrito,office,daysRaw,days[],freqLetters,lat,lon,featIdx,geoDistName,part,proposedDays[],proposedLetters}

  // ====== Utilitarios ======
  function normalize(s){
    return (s ?? "").toString().normalize("NFD").replace(/\p{Diacritic}/gu, "").toUpperCase().trim();
  }
  function normalizeName(s){ return normalize(s).replace(/\s+/g,' '); }
  function num(s){
    if (s == null) return NaN;
    const t = s.toString().replace(",", ".");
    const v = parseFloat(t);
    return Number.isFinite(v) ? v : NaN;
  }
  function hasHeader(row){
    const a = num(row[28]), b = num(row[29]);
    const t28 = (row[28] ?? "").toString().toLowerCase();
    const t29 = (row[29] ?? "").toString().toLowerCase();
    if (!Number.isFinite(a) || !Number.isFinite(b)) return true;
    if (t28.includes("lat") || t29.includes("lon")) return true;
    return false;
  }
  function parseDays(raw){
    const s = (raw ?? "").toString().toUpperCase().replace(/[^LMXJVS]/g,"");
    const set = new Set();
    for (const ch of s) if (dayLetterToName[ch]) set.add(dayLetterToName[ch]);
    return Array.from(set);
  }
  function toFreqLetters(dayArr){
    const order = ["Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
    return order.map(n => dayArr.includes(n) ? dayNameToLetter[n] : "").join("");
  }

  // ——— Nombres de distrito desde el GeoJSON (clave robusta) ———
  const DIST_KEYS = ["NOMBDIST","DISTRITO","DIST","NOMBRE","NAME","nom_dist","nomdistr","distrito","Distrito","NOMDIST","NOMBREDIST","NOMB_DIST"];
  function getFeatureDistName(f){
    const p = f?.properties || {};
    for (const k of DIST_KEYS){
      if (p[k] && typeof p[k] === "string" && p[k].trim().length) return p[k].trim();
    }
    // fallback: primera propiedad string
    for (const key in p){
      if (typeof p[key] === "string" && p[key].trim().length) return p[key].trim();
    }
    return "Distrito";
  }

  // Devuelve índice y nombre del polígono que contiene el punto (o null)
  function getContainingFeature(lat, lon){
    if (!areaFeatures) return null;
    const pt = turf.point([lon, lat]);
    const feats = areaFeatures.features || [];
    for (let i=0; i<feats.length; i++){
      const f = feats[i];
      if (turf.booleanPointInPolygon(pt, f)) {
        return { idx:i, name:getFeatureDistName(f) };
      }
    }
    return null;
  }

  // ====== Leyenda ======
  const legendEl = document.getElementById('legend');
  function renderLegend(){
    if (viewMode === "Actual") {
      legendEl.innerHTML = `
        <h4>🎯 Atención actual (dentro del polígono)</h4>
        ${["Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"].map(d=>
          `<div class="row"><span class="swatch" style="background:${dayColors[d]}"></span> ${d}</div>`).join("")}
        <div class="row"><span class="pill">Filtro día:</span> <span>${selectedDay}</span></div>
        <div class="row"><span class="pill">Marcadores:</span> <span>${showMarkers ? "ON" : "OFF"}</span></div>
      `;
    } else {
      const counts = countByPartWithFilters();
      legendEl.innerHTML = `
        <h4>🧭 Propuesta equilibrada (3 zonas oeste→este)</h4>
        <div class="row"><span class="swatch" style="background:${partColors.A}"></span> Parte A → Lunes &amp; Jueves (LJ) <span class="pill">${counts.A} clientes</span></div>
        <div class="row"><span class="swatch" style="background:${partColors.B}"></span> Parte B → Martes &amp; Viernes (MV) <span class="pill">${counts.B} clientes</span></div>
        <div class="row"><span class="swatch" style="background:${partColors.C}"></span> Parte C → Miércoles &amp; Sábado (XS) <span class="pill">${counts.C} clientes</span></div>
        <div class="row"><span class="pill">Filtro día:</span> <span>${selectedDay}</span></div>
        <div class="row"><span class="pill">Marcadores:</span> <span>${showMarkers ? "ON" : "OFF"}</span></div>
      `;
    }
  }

  function fitToContent(){
    let bounds = null;
    const layers = [];
    if (map.hasLayer(currentLayer))  layers.push(currentLayer);
    if (map.hasLayer(proposedLayer)) layers.push(proposedLayer);
    if (map.hasLayer(boundaryLayer)) layers.push(boundaryLayer);
    if (map.hasLayer(partPolysLayer)) layers.push(partPolysLayer);
    for (const l of layers){
      const b = l.getBounds?.();
      if (b && b.isValid()){
        bounds = bounds ? bounds.extend(b) : b;
      }
    }
    if (bounds && bounds.isValid()) map.fitBounds(bounds.pad(0.08));
    else map.setView([-12.0464, -77.0428], 10);
  }

  function buildPopUp(r){
    const gm = `https://www.google.com/maps?q=${r.lat},${r.lon}`;
    const proposedDaysStr = (r.proposedDays && r.proposedDays.length) ? r.proposedDays.join(", ") : "—";
    const partDays = r.part ? (partToDays[r.part]?.join(" & ")) : "—";
    const distShown = r.geoDistName || r.distrito || "—";
    return `
      <div style="min-width:240px">
        <div style="font-weight:700; font-size:14px; margin-bottom:6px;">Cliente: ${r.code}</div>
        <div><strong>Nombre:</strong> ${r.name || "—"}</div>
        <div><strong>Distrito (GeoJSON):</strong> ${distShown}</div>
        <div><strong>Oficina:</strong> ${r.office}</div>
        <hr style="border:none;border-top:1px solid #1f2937; margin:6px 0;">
        <div><strong>Frecuencia actual:</strong> <span class="freq">${r.freqLetters || "—"}</span> <span style="color:#9CA3AF">(${r.days.join(", ") || "—"})</span></div>
        <div><strong>Propuesta:</strong> <span class="freq">${r.proposedLetters || "—"}</span> <span style="color:#9CA3AF">(${proposedDaysStr})</span></div>
        <div><strong>Parte:</strong> ${r.part ?? "—"} <span style="color:#9CA3AF">(${partDays})</span></div>
        <div style="margin-top:6px;"><a href="${gm}" target="_blank" rel="noopener">Abrir en Google Maps ↗</a></div>
      </div>
    `;
  }

  // ====== Render de capas ======
  function refreshLayers(){
    currentLayer.clearLayers();
    proposedLayer.clearLayers();

    const useAte = filterOffices.has("OFIC ATE");
    const useChorri = filterOffices.has("OFIC CHORRILLOS");
    const validOffice = (oNorm) => ( (oNorm === "OFIC ATE" && useAte) || (oNorm === "OFIC CHORRILLOS" && useChorri) );

    if (showMarkers){
      for (const r of records){
        if (!validOffice(normalize(r.office))) continue;

        if (viewMode === "Actual"){
          const passes = (selectedDay === "Todos") ? r.days.length > 0 : r.days.includes(selectedDay);
          if (!passes) continue;
          const color = (selectedDay === "Todos") ? (dayColors[r.days[0]] || "#6b7280") : (dayColors[selectedDay] || "#6b7280");

          const marker = L.circleMarker([r.lat, r.lon], {
            pane:'markersPane',
            radius:5.5, stroke:true, weight:1, color:"#0b1221",
            fillColor: color, fillOpacity:0.95
          }).bindPopup(buildPopUp(r));
          currentLayer.addLayer(marker);

        } else {
          const passes = (selectedDay === "Todos") ? true : (r.proposedDays?.includes(selectedDay));
          if (!passes) continue;
          const color = partColors[r.part] || "#6b7280";

          const marker = L.circleMarker([r.lat, r.lon], {
            pane:'markersPane',
            radius:5.5, stroke:true, weight:1, color:"#0b1221",
            fillColor: color, fillOpacity:0.95
          }).bindPopup(buildPopUp(r));
          proposedLayer.addLayer(marker);
        }
      }
    }

    if (viewMode === "Actual"){
      if (!map.hasLayer(currentLayer)) currentLayer.addTo(map);
      if (map.hasLayer(proposedLayer)) map.removeLayer(proposedLayer);
    } else {
      if (!map.hasLayer(proposedLayer)) proposedLayer.addTo(map);
      if (map.hasLayer(currentLayer)) map.removeLayer(currentLayer);
    }

    drawPartPolygons();
    renderLegend();
    fitToContent();
  }

  // ====== Conteo por parte (leyenda propuesta) ======
  function countByPartWithFilters(){
    const useAte = filterOffices.has("OFIC ATE");
    const useChorri = filterOffices.has("OFIC CHORRILLOS");
    const validOffice = (oNorm) => ( (oNorm === "OFIC ATE" && useAte) || (oNorm === "OFIC CHORRILLOS" && useChorri) );
    const counts = {A:0, B:0, C:0};
    for (const r of records){
      if (!validOffice(normalize(r.office))) continue;
      if (selectedDay !== "Todos" && !(r.proposedDays?.includes(selectedDay))) continue;
      if (r.part && counts[r.part] !== undefined) counts[r.part]++;
    }
    return counts;
  }

  // ====== Polígonos por parte (hulls recortados para no solapar) ======
  function drawPartPolygons(){
    partPolysLayer.clearLayers();

    const groups = { A:[], B:[], C:[] };
    for (const r of records) if (r.part) groups[r.part].push(turf.point([r.lon, r.lat]));

    const hulls = {};
    ["A","B","C"].forEach(p=>{
      const pts = groups[p];
      if (!pts || pts.length === 0) return;
      const fc = turf.featureCollection(pts);
      let hull = null;
      if (pts.length >= 3) hull = turf.convex(fc);
      if (!hull){
        const centroid = turf.center(fc);
        hull = turf.buffer(centroid, 1, {units:"kilometers"});
      }
      hulls[p] = hull;
    });

    const order = Object.keys(hulls).sort((p1,p2)=>{
      const c1 = turf.center(hulls[p1]).geometry.coordinates[0];
      const c2 = turf.center(hulls[p2]).geometry.coordinates[0];
      return c1 - c2;
    });

    const result = {};
    let unionPrev = null;
    for (const p of order){
      let poly = hulls[p];
      if (unionPrev){
        const diff = turf.difference(poly, unionPrev);
        if (diff) poly = diff;
      }
      poly = largestPolygon(poly);
      result[p] = poly;
      unionPrev = unionPrev ? turf.union(unionPrev, poly) : poly;
    }

    ["A","B","C"].forEach(p=>{
      if (!result[p]) return;
      L.geoJSON(result[p], {
        pane:'zonesPane',
        style: {
          color: partColors[p],
          weight: 1.2,
          fillColor: partFill[p],
          fillOpacity: 0.15
        }
      }).addTo(partPolysLayer);
    });
  }

  function largestPolygon(feature){
    if (!feature) return null;
    const geom = feature.geometry;
    if (!geom) return feature;
    if (geom.type === 'Polygon') return feature;
    if (geom.type === 'MultiPolygon'){
      let maxA = -1, best = null;
      for (const coords of geom.coordinates){
        const poly = turf.polygon(coords, feature.properties || {});
        const a = turf.area(poly);
        if (a > maxA){ maxA = a; best = poly; }
      }
      return best;
    }
    return feature;
  }

  // ====== Balanceo por cantidad + “Snap” por distrito GeoJSON ======
  function assignBalancedPartsAndSnapToDistricts(){
    // 1) Balanceo por cantidad (oeste→este)
    const sorted = [...records].sort((a,b)=>a.lon - b.lon);
    const n = sorted.length;
    if (n === 0) return;
    const size = Math.ceil(n / 3);
    const cut1 = size;
    const cut2 = size * 2;

    for (let i=0; i<n; i++){
      const r = sorted[i];
      let part = "C";
      if (i < cut1) part = "A";
      else if (i < cut2) part = "B";
      r.part = part;
      r.proposedDays = partToDays[part];
      r.proposedLetters = partToFreqLetters[part];
    }

    // 2) Mayoría por distrito GeoJSON (featIdx)
    const byFeat = new Map(); // featIdx -> {A,B,C}
    for (const r of records){
      const key = r.featIdx;
      if (key == null) continue;
      if (!byFeat.has(key)) byFeat.set(key, {A:0,B:0,C:0});
      byFeat.get(key)[r.part] = (byFeat.get(key)[r.part] || 0) + 1;
    }
    const featMajority = new Map(); // featIdx -> 'A'|'B'|'C'
    for (const [idx, counts] of byFeat){
      let maj = "A", max = -1;
      for (const p of ["A","B","C"]){
        if ((counts[p] || 0) > max){ max = counts[p]; maj = p; }
      }
      featMajority.set(idx, maj);
    }

    // 3) Snap final: todo punto adopta la parte de su distrito (elimina lunares)
    for (const r of records){
      const mj = featMajority.get(r.featIdx);
      if (mj && r.part !== mj){
        r.part = mj;
        r.proposedDays = partToDays[mj];
        r.proposedLetters = partToFreqLetters[mj];
      }
    }
  }

  // ====== Ingesta del CSV + GeoJSON ======
  function ingestRows(rows){
    const startIdx = hasHeader(rows[0]) ? 1 : 0;

    const prelim = [];
    for (let i=startIdx; i<rows.length; i++){
      const row = rows[i];
      if (!row) continue;

      const code = (row[0] ?? "").toString().trim();
      if (EXCLUDE_CODES.has(code)) continue;

      const name = (row[7] ?? "").toString().trim();
      const canal = (row[21] ?? "").toString().trim();   // col[21]
      const interloc = (row[26] ?? "").toString().trim(); // col[26]
      const lat = num(row[28]);
      const lon = num(row[29]);
      if (!Number.isFinite(lat) || !Number.isFinite(lon)) continue;

      const office = (row[46] ?? "").toString().trim();
      const officeNorm = normalize(office);
      if (!OFFICES.has(officeNorm)) continue;

      // Filtro espacial + capturar distrito desde GeoJSON
      const container = getContainingFeature(lat, lon);
      if (!container) continue;
      const geoDistName = container.name;
      const geoDistNorm = normalize(geoDistName);
      if (EXCLUDE_DISTRICTS.has(geoDistNorm)) continue;

      // Filtros adicionales
      if (normalize(canal) === normalize(EXCLUDE_CANAL)) continue; // Canal MOD
      if (interloc === EXCLUDE_INTERLOC) continue;                 // Interlocutor 211087

      const csvDistrito = (row[17] ?? "").toString().trim();
      const daysRaw = (row[48] ?? "").toString().trim();
      const days = parseDays(daysRaw);
      const freqLetters = toFreqLetters(days);

      prelim.push({
        code, name, distrito: csvDistrito, office,
        daysRaw, days, freqLetters, lat, lon,
        featIdx: container.idx, geoDistName
      });
    }

    // Deduplicación por (Nombre normalizado + Lat/Lon)
    const seen = new Set();
    const deduped = [];
    for (const r of prelim){
      const nameKey = normalizeName(r.name || "");
      const latKey = Number.isFinite(r.lat) ? r.lat.toFixed(6) : "";
      const lonKey = Number.isFinite(r.lon) ? r.lon.toFixed(6) : "";
      const key = `${nameKey}|${latKey}|${lonKey}`;
      if (seen.has(key)) continue;
      seen.add(key);
      deduped.push(r);
    }

    records = deduped;

    // Particionar y “snap” por distrito GeoJSON
    assignBalancedPartsAndSnapToDistricts();

    // Pintar
    refreshLayers();
  }

  // ====== Eventos UI ======
  document.getElementById('viewToggle').addEventListener('change', (e)=>{
    viewMode = e.target.checked ? "Propuesta" : "Actual";
    refreshLayers();
  });

  document.getElementById('dayFilter').addEventListener('click', (e)=>{
    if (e.target.tagName === "BUTTON"){
      document.querySelectorAll('#dayFilter button').forEach(b=>b.classList.remove('active'));
      e.target.classList.add('active');
      selectedDay = e.target.dataset.day;
      refreshLayers();
    }
  });

  document.getElementById('oficAte').addEventListener('change', (e)=>{
    if (e.target.checked) filterOffices.add("OFIC ATE"); else filterOffices.delete("OFIC ATE");
    renderLegend();
    refreshLayers();
  });
  document.getElementById('oficChorri').addEventListener('change', (e)=>{
    if (e.target.checked) filterOffices.add("OFIC CHORRILLOS"); else filterOffices.delete("OFIC CHORRILLOS");
    renderLegend();
    refreshLayers();
  });

  document.getElementById('markersToggle').addEventListener('change', (e)=>{
    showMarkers = e.target.checked;
    renderLegend();
    refreshLayers();
  });

  document.getElementById('fitBtn').addEventListener('click', fitToContent);

  // ====== Carga GeoJSON + CSV ======
  fetch(GEOJSON_URL)
    .then(r => r.json())
    .then(geo => {
      areaFeatures = (geo && geo.type === "FeatureCollection") ? geo : { type:"FeatureCollection", features: [geo] };
      boundaryLayer.addData(areaFeatures);
      try {
        const b = boundaryLayer.getBounds();
        if (b && b.isValid()) map.fitBounds(b.pad(0.05));
      } catch(e){}
      Papa.parse(CSV_URL, {
        download:true,
        dynamicTyping:false,
        skipEmptyLines:true,
        complete: (results) => {
          const rows = results.data;
          if (!rows || !rows.length){
            alert("No se pudo leer el CSV o está vacío.");
            return;
          }
          ingestRows(rows);
        },
        error: (err) => {
          console.error(err);
          alert("Error al descargar o parsear el CSV.");
        }
      });
    })
    .catch(err => {
      console.error("No se pudo cargar el GeoJSON:", err);
      alert("No se pudo cargar el GeoJSON de límites.");
      Papa.parse(CSV_URL, {
        download:true,
        dynamicTyping:false,
        skipEmptyLines:true,
        complete: (results) => {
          const rows = results.data;
          if (!rows || !rows.length){
            alert("No se pudo leer el CSV o está vacío.");
            return;
          }
          alert("Advertencia: no se aplicó el filtro por polígono (GeoJSON no disponible).");
          ingestRows(rows);
        }
      });
    });

})();
</script>
</body>
</html>
