<script>
(function(){

/* =====================================
   FUNCIONES BASE
=====================================*/

/* Número compacto para volúmenes */
function compactNumber(n){
  if(n >= 1_000_000) return (n/1_000_000).toFixed(1)+"M";
  if(n >= 1_000)    return (n/1_000).toFixed(1)+"k";
  return n.toString();
}

/* Normalización texto */
function normalize(s){
  try{
    return (s??"").toString()
      .normalize("NFD").replace(/\p{Diacritic}/gu,"")
      .toUpperCase().trim();
  }catch(e){
    return (s??"").toString().toUpperCase().trim();
  }
}

function normalizeName(s){
  return normalize(s).replace(/\s+/g," ");
}

function num(s){
  if(s==null) return NaN;
  const t=s.toString().replace(",",".");
  const v=parseFloat(t);
  return Number.isFinite(v)?v:NaN;
}

/* Variables globales */
const CSV_URL  = "https://raw.githubusercontent.com/sigmaperu/MapInfo/main/Catalogo%20Sigma.csv";
const VOL_URL  = "https://raw.githubusercontent.com/sigmaperu/MapInfo/main/Vol_Prom.csv";
const GEOJSON_URL = "https://raw.githubusercontent.com/sigmaperu/RoadMap/main/Distritos.geojson";

let records = [];
let volumenDict = {};
let areaFeatures = null;
let neighbors = {};   // contigüidad automática

let viewMode = "Actual";
let partMode = "clientes";
let selectedDay = "Todos";
let selectedCanal = "Todos";
let filterOffices = new Set(["OFIC ATE","OFIC CHORRILLOS"]);
let showMarkers = true;
let filterZ3 = false;

/* Map setup */
const map = L.map('map',{ preferCanvas:true, zoomControl:false });
L.control.zoom({position:'bottomright'}).addTo(map);

map.createPane("zonesPane").style.zIndex = 300;
map.createPane("markersPane").style.zIndex = 600;

L.tileLayer(
  "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
  { attribution:"© OpenStreetMap" }
).addTo(map);

const currentLayer  = L.layerGroup().addTo(map);
const proposedLayer = L.layerGroup();
const boundaryLayer = L.geoJSON(null,{
  pane:"zonesPane",
  style:{ color:"#ef4444", weight:1, fill:false }
}).addTo(map);

const districtsLayerHolder = L.layerGroup().addTo(map);

``

 /* =====================================
   INGESTA DE VOLUMENES (Vol_Prom.csv)
=====================================*/
function ingestVolumenes(rows){
  for(let i=1; i<rows.length; i++){
    const row = rows[i];
    if(!row || row.length < 2) continue;

    const code = (row[0] ?? "").toString().trim();
    const vol  = Number(row[1]) || 0;

    if(code) volumenDict[code] = vol;
  }
}

/* =====================================
   LECTURA DE DISTRITO DESDE GEOJSON
=====================================*/
const DIST_KEYS = [
  "NOMBDIST","DISTRITO","DIST","NOMBRE","NAME","nom_dist",
  "nomdistr","distrito","Distrito","NOMDIST","NOMBREDIST","NOMB_DIST"
];

function getFeatureDistName(f){
  const p = f?.properties ?? {};
  for(const k of DIST_KEYS){
    if(p[k] && typeof p[k] === "string" && p[k].trim().length){
      return p[k].trim();
    }
  }
  for(const k in p){
    if(typeof p[k] === "string" && p[k].trim().length){
      return p[k].trim();
    }
  }
  return "Distrito";
}

/* =====================================
   VER SI UNA FILA TIENE HEADERS
=====================================*/
function hasHeader(row){
  const a = num(row[28]);
  const b = num(row[29]);
  const t28 = (row[28] ?? "").toString().toLowerCase();
  const t29 = (row[29] ?? "").toString().toLowerCase();

  if(!Number.isFinite(a) || !Number.isFinite(b)) return true;
  if(t28.includes("lat") || t29.includes("lon")) return true;

  return false;
}

/* =====================================
   INGESTA DEL CSV PRINCIPAL (Sigma)
=====================================*/
function ingestRows(rows){

  const startIdx = hasHeader(rows[0]) ? 1 : 0;
  const prelim = [];

  for(let i=startIdx; i<rows.length; i++){
    const row = rows[i];
    if(!row) continue;

    const code = (row[0] ?? "").toString().trim();
    if(!code) continue;

    const name  = (row[7]  ?? "").toString().trim();
    const canal = (row[21] ?? "").toString().trim();
    const lat   = num(row[28]);
    const lon   = num(row[29]);
    const office = (row[46] ?? "").toString().trim();

    if(!Number.isFinite(lat) || !Number.isFinite(lon)) continue;

    // Localizar distrito por polígono
    const container = getContainingFeature(lat, lon);
    if(!container) continue;

    // Armar objeto preliminar
    const daysRaw = (row[48] ?? "").toString().trim();
    const days = parseDays(daysRaw);
    const freqLetters = days
      .map(d => dayNameToLetter[d] ?? "")
      .join("");

    prelim.push({
      code,
      name,
      canal,
      canalNorm: normalize(canal),
      distrito: (row[17] ?? "").toString().trim(),
      office,
      lat, lon,
      featIdx: container.idx,
      geoDistName: container.name,
      daysRaw, days, freqLetters,
      volume: volumenDict[code] ?? 0,   // volumen ya unido
      hadZ3: days.length > 2
    });
  }

  /* Deduplicación */
  const seen = new Set();
  const dedupe = [];

  for(const r of prelim){
    const key = `${normalizeName(r.name)}_${r.lat.toFixed(6)}_${r.lon.toFixed(6)}`;
    if(seen.has(key)) continue;
    seen.add(key);
    dedupe.push(r);
  }

  records = dedupe;

  // Filtro canales
  populateCanalFilter(records.map(r => r.canal).filter(Boolean));

  // Particiones se harán luego (en otra parte)
}

/* =====================================
   DETECTAR FEATURE QUE CONTIENE UN PUNTO
=====================================*/
function getContainingFeature(lat, lon){
  if(!areaFeatures) return null;

  const pt = turf.point([lon, lat]);
  const feats = areaFeatures.features ?? [];

  for(let i=0; i<feats.length; i++){
    if(turf.booleanPointInPolygon(pt, feats[i])){
      return { idx:i, name:getFeatureDistName(feats[i]) };
    }
  }
  return null;
}

/* =====================================
   CARGA DE ARCHIVOS (Volumen + GeoJSON + CSV)
=====================================*/
function loadAll(){

  // 1. Cargar volumenes
  Papa.parse(VOL_URL,{
    download:true,
    dynamicTyping:false,
    skipEmptyLines:true,
    complete: volData => {

      ingestVolumenes(volData.data);

      // 2. Cargar distritos
      fetch(GEOJSON_URL)
        .then(r => r.json())
        .then(geo => {

          // normalizar estructura
          areaFeatures = (geo && geo.type === "FeatureCollection")
            ? geo
            : { type:"FeatureCollection", features:[geo] };

          areaFeatures.features.forEach((f,i)=>{
            if(!f.properties) f.properties = {};
            f.properties.__idx = i;
          });

          boundaryLayer.addData(areaFeatures);

          // zoom base
          try{
            const b = boundaryLayer.getBounds();
            if(b && b.isValid()) map.fitBounds(b.pad(0.05));
          }catch(e){}

          // 3. Cargar CSV principal
          Papa.parse(CSV_URL,{
            download:true,
            dynamicTyping:false,
            skipEmptyLines:true,
            complete: results => {
              ingestRows(results.data);

              // Aquí NO renderizamos aún, se hace luego de generar particiones
            },
            error: err => {
              alert("Error al cargar CSV principal");
            }
          });

        })
        .catch(err=>{
          alert("Error al cargar GeoJSON");
        });

    },
    error: err=>{
      alert("No se pudo cargar Vol_Prom.csv");
    }
  });
}

// Ejecutar carga
loadAll();

/* FIN PARTE 2 / 6 */

 /* =====================================
   DETECCIÓN AUTOMÁTICA DE CONTIGÜIDAD
   (Matriz de vecinos por distrito)
=====================================*/

function computeContiguity(){

  if(!areaFeatures || !areaFeatures.features) return;

  const feats = areaFeatures.features;
  const N = feats.length;

  // Inicializar lista vacía
  for(let i=0; i<N; i++){
    neighbors[i] = [];
  }

  // Comparar todos contra todos (N≈43 → rápido)
  for(let i=0; i<N; i++){
    for(let j=i+1; j<N; j++){

      try{
        const fA = feats[i];
        const fB = feats[j];

        // Determina si comparten frontera o punto
        if(turf.booleanIntersects(fA, fB)){
          neighbors[i].push(j);
          neighbors[j].push(i);
        }

      }catch(e){
        // Si falla el check de intersección, ignorar el par
      }

    }
  }

  // Quitar duplicados
  for(let i=0; i<N; i++){
    neighbors[i] = Array.from(new Set(neighbors[i]));
  }
}

/* =====================================
   getContainingFeature (incluído aquí
   para consistencia y referencia)
=====================================*/
function getContainingFeature(lat, lon){
  if(!areaFeatures) return null;

  const pt = turf.point([lon, lat]);
  const feats = areaFeatures.features ?? [];

  for(let i=0; i<feats.length; i++){
    if(turf.booleanPointInPolygon(pt, feats[i])){
      return { idx:i, name:getFeatureDistName(feats[i]) };
    }
  }
  return null;
}

/* =====================================
   LLAMADA DESPUÉS DE CARGAR GEOJSON
=====================================*/
function afterGeoJSONLoaded(){
  computeContiguity();
}

/* === FIN PARTE 3 / 6 === */

 /* =====================================================
   PARTICIÓN POR CLIENTES (A/B/C clásica)
   Mantiene el comportamiento original del proyecto.
======================================================*/

let featurePartByIdx_clientes = new Map();

function assignBalancedParts_Clientes(){

  if(!records || !records.length) return;

  // 1. Ordenar clientes por longitud (este criterio es el original)
  const sorted = [...records].sort((a,b)=> a.lon - b.lon);

  const n = sorted.length;
  const size = Math.ceil(n / 3);
  const cut1 = size;
  const cut2 = size * 2;

  // 2. Asignar parte A/B/C
  for(let i=0; i<n; i++){
    const r = sorted[i];

    if(i < cut1)       r.part = "A";
    else if(i < cut2)  r.part = "B";
    else               r.part = "C";

    r.proposedDays      = partToDays[r.part];
    r.proposedLetters   = partToFreqLetters[r.part];
  }

  // 3. Determinar la parte dominante en cada distrito
  const byFeat = new Map();

  for(const r of records){
    const f = r.featIdx;
    if(f == null) continue;

    if(!byFeat.has(f)) byFeat.set(f, {A:0, B:0, C:0});
    byFeat.get(f)[r.part]++;
  }

  // 4. Asignar parte dominante a cada distrito
  featurePartByIdx_clientes = new Map();

  for(const [featIdx, counts] of byFeat){
    let maj = "A";
    let max = -1;

    for(const p of ["A","B","C"]){
      if(counts[p] > max){
        max = counts[p];
        maj = p;
      }
    }

    featurePartByIdx_clientes.set(featIdx, maj);
  }

  // 5. Reasignar clientes a la parte dominante del distrito
  for(const r of records){
    const dom = featurePartByIdx_clientes.get(r.featIdx);
    if(dom && r.part !== dom){
      r.part = dom;
      r.proposedDays    = partToDays[dom];
      r.proposedLetters = partToFreqLetters[dom];
    }
  }
}

/* === FIN PARTE 4 / 6 === */

 /* ============================================================
   PARTICIÓN CONTIGUA EQUILIBRADA POR VOLUMEN (C‑1 ±12%)
   - Mueve distritos completos
   - Mantiene contigüidad geográfica
   - Respeta forma original de zonas
   - Aplica tolerancia ±12%
============================================================*/

let featurePartByIdx_volumen = new Map();

function assignBalancedParts_Volumen(){

  if(!records.length) return;
  if(!areaFeatures) return;
  if(!neighbors) return;

  const feats = areaFeatures.features;
  const N = feats.length;

  /* ============================================================
     1) Cálculo de volumen total por distrito
  ============================================================*/
  const volPorDistrito = Array(N).fill(0);

  for(const r of records){
    if(r.featIdx != null){
      volPorDistrito[r.featIdx] += (r.volume ?? 0);
    }
  }

  /* ============================================================
     2) Partición inicial por volumen (greedy, sin contigüidad)
  ============================================================*/
  let cargaA = 0, cargaB = 0, cargaC = 0;
  let distritoPart = Array(N).fill(null);

  // Ordenar distritos por su centroide en X (lon)
  const orderedFeats = [...Array(N).keys()].sort((i,j)=>{
    const cA = feats[i].geometry;
    const cB = feats[j].geometry;

    const lonA = turf.centroid(feats[i]).geometry.coordinates[0];
    const lonB = turf.centroid(feats[j]).geometry.coordinates[0];
    return lonA - lonB;
  });

  // Asignación greedy
  for(const idx of orderedFeats){
    const v = volPorDistrito[idx];
    if(cargaA <= cargaB && cargaA <= cargaC){
      distritoPart[idx] = "A"; cargaA += v;
    } else if(cargaB <= cargaA && cargaB <= cargaC){
      distritoPart[idx] = "B"; cargaB += v;
    } else {
      distritoPart[idx] = "C"; cargaC += v;
    }
  }

  /* ============================================================
     3) Función auxiliar: verificar contigüidad
     Verifica que cada parte siga siendo un conjunto conectado.
  ============================================================*/
  function isContiguous(partLabel){

    const assigned = [];
    for(let i=0; i<N; i++){
      if(distritoPart[i] === partLabel) assigned.push(i);
    }
    if(assigned.length <= 1) return true;

    const visited = new Set();
    const queue = [assigned[0]];
    visited.add(assigned[0]);

    while(queue.length){
      const cur = queue.shift();
      for(const nb of neighbors[cur]){
        if(distritoPart[nb] === partLabel && !visited.has(nb)){
          visited.add(nb);
          queue.push(nb);
        }
      }
    }

    return visited.size === assigned.length;
  }

  /* ============================================================
     4) Intento de equilibrio C‑1 (±12%)
     - Mover distritos frontera si reduce desequilibrio
     - Mantener contigüidad
  ============================================================*/
  function totalLoads(){
    let cA=0, cB=0, cC=0;
    for(let i=0;i<N;i++){
      if(distritoPart[i]==="A") cA+=volPorDistrito[i];
      if(distritoPart[i]==="B") cB+=volPorDistrito[i];
      if(distritoPart[i]==="C") cC+=volPorDistrito[i];
    }
    return {A:cA, B:cB, C:cC};
  }

  function diffMetric(L){
    const arr=[L.A, L.B, L.C];
    const max=Math.max(...arr);
    const min=Math.min(...arr);
    return max-min;
  }

  // Tolerancia: diferencia máxima aceptable
  function withinTolerance(L){
    const arr=[L.A, L.B, L.C];
    const avg = (L.A + L.B + L.C)/3;
    const maxD = avg * 0.12;
    return (Math.max(...arr) - Math.min(...arr)) <= maxD;
  }

  // Ajuste iterativo
  let improving = true;

  while(improving){
    improving = false;

    const L = totalLoads();
    if(withinTolerance(L)) break;

    // Parte más cargada
    let mayor = "A";
    if(L.B > L[mayor]) mayor = "B";
    if(L.C > L[mayor]) mayor = "C";

    // Distritos frontera de esa parte
    const front = [];
    for(let i=0; i<N; i++){
      if(distritoPart[i] !== mayor) continue;
      for(const nb of neighbors[i]){
        if(distritoPart[nb] !== mayor){
          front.push(i);
          break;
        }
      }
    }

    // Intentar mover un distrito frontera al vecino menos cargado
    for(const d of front){

      const v = volPorDistrito[d];

      // Partes vecinas
      const neighParts = new Set();
      for(const nb of neighbors[d]){
        if(distritoPart[nb] !== mayor){
          neighParts.add(distritoPart[nb]);
        }
      }

      for(const np of neighParts){
        const old = distritoPart[d];
        distritoPart[d] = np;

        // Verificar contigüidad
        if(!isContiguous(old) || !isContiguous(np)){
          distritoPart[d] = old;
          continue;
        }

        const newLoads = totalLoads();
        if(diffMetric(newLoads) < diffMetric(L)){
          improving = true;
          break;
        } else {
          distritoPart[d] = old;
        }
      }

      if(improving) break;
    }
  }

  /* ============================================================
     5) Asignar r.partVolFinal a cada cliente
  ============================================================*/
  for(const r of records){
    const d = r.featIdx;
    const pv = distritoPart[d];
    r.partVol = pv;
    r.proposedVolDays    = partToDays[pv];
    r.proposedVolLetters = partToFreqLetters[pv];
  }

  /* ============================================================
     6) Guardar parte final por distrito
  ============================================================*/
  featurePartByIdx_volumen = new Map();
  for(let i=0;i<N;i++){
    featurePartByIdx_volumen.set(i, distritoPart[i]);
  }
}

/* === FIN PARTE 5 / 6 === */

 /* ============================================================
   RENDER DE POPUP (actual + propuesta por clientes + volumen)
============================================================*/

function buildPopUp(r){
  const gm = `https://www.google.com/maps?q=${r.lat},${r.lon}`;

  const freqNow = r.freqLetters ?? "—";
  const freqCli = r.proposedLetters ?? "—";
  const freqVol = r.proposedVolLetters ?? "—";

  const daysCli = (r.proposedDays ?? []).join(", ");
  const daysVol = (r.proposedVolDays ?? []).join(", ");

  const dist = r.geoDistName ?? r.distrito ?? "—";

  return `
    <div style="min-width:260px; line-height:1.28;">
      <div class="popup-line" style="font-weight:700; font-size:14px;">
        Cliente: ${escapeHtml(r.code)}
      </div>

      <div class="popup-line"><strong>Nombre:</strong> ${escapeHtml(r.name)}</div>
      <div class="popup-line"><strong>Canal:</strong> ${escapeHtml(r.canal)}</div>
      <div class="popup-line"><strong>Distrito:</strong> ${escapeHtml(dist)}</div>
      <div class="popup-line"><strong>Oficina:</strong> ${escapeHtml(r.office)}</div>

      <div class="popup-line"><strong>Volumen prom (kg/día):</strong> ${compactNumber(r.volume ?? 0)}</div>

      <hr style="border:none;border-top:1px solid #1f2937; margin:6px 0;" />

      <div class="popup-line"><strong>Frecuencia actual:</strong> <span class="freq">${freqNow}</span></div>

      <div class="popup-line"><strong>Propuesta clientes:</strong>
        <span class="freq">${freqCli}</span>
        <span class="popup-muted">(${daysCli})</span>
      </div>

      <div class="popup-line"><strong>Propuesta volumen:</strong>
        <span class="freq">${freqVol}</span>
        <span class="popup-muted">(${daysVol})</span>
      </div>

      <div class="popup-line" style="margin-top:6px;">
        ${gm}Abrir en Google Maps ↗</a>
      </div>
    </div>
  `;
}


/* ============================================================
   RESUMEN DISTRITO (para popup al hacer click en polígono)
============================================================*/

function summarizeDistrict(idx){

  const useAte = filterOffices.has("OFIC ATE");
  const useChorri = filterOffices.has("OFIC CHORRILLOS");

  function validOffice(o){
    return (o==="OFIC ATE" && useAte) || (o==="OFIC CHORRILLOS" && useChorri);
  }

  const out = { total:0, A:0, B:0, C:0, carga:0 };

  for(const r of records){
    if(r.featIdx !== idx) continue;
    if(!validOffice(normalize(r.office))) continue;
    if(selectedCanal!=="Todos" && normalize(r.canal)!==normalize(selectedCanal)) continue;
    if(filterZ3 && !r.hadZ3) continue;

    let pass = true;

    if(selectedDay!=="Todos"){
      if(viewMode==="Actual"){
        pass = r.days.includes(selectedDay);
      } else {
        pass = (partMode==="clientes"
                ? (r.proposedDays ?? []).includes(selectedDay)
                : (r.proposedVolDays ?? []).includes(selectedDay));
      }
    }

    if(!pass) continue;

    out.total++;
    const p = (viewMode==="Actual")
      ? null
      : (partMode==="clientes" ? r.part : r.partVol);

    if(p && out[p]!==undefined) out[p]++;
    out.carga += (r.volume ?? 0);
  }

  return out;
}


/* ============================================================
   LEYENDA (incluye volúmenes en formato compacto)
============================================================*/

function renderLegend(){

  const legend = document.getElementById("legend");

  const channelCounts = {};
  const channelVolumes = {};

  const useAte = filterOffices.has("OFIC ATE");
  const useChorri = filterOffices.has("OFIC CHORRILLOS");

  function validOffice(o){
    return (o==="OFIC ATE" && useAte) || (o==="OFIC CHORRILLOS" && useChorri);
  }

  for(const r of records){

    if(!validOffice(normalize(r.office))) continue;
    if(selectedCanal!=="Todos" && normalize(r.canal)!==normalize(selectedCanal)) continue;
    if(filterZ3 && !r.hadZ3) continue;

    let pass = true;

    if(selectedDay!=="Todos"){
      if(viewMode==="Actual"){
        pass = r.days.includes(selectedDay);
      } else {
        pass = (partMode==="clientes"
                ? (r.proposedDays ?? []).includes(selectedDay)
                : (r.proposedVolDays ?? []).includes(selectedDay));
      }
    }
    if(!pass) continue;

    const c = r.canal ?? "Sin canal";
    channelCounts[c] = (channelCounts[c] ?? 0) + 1;
    channelVolumes[c] = (channelVolumes[c] ?? 0) + (r.volume ?? 0);
  }

  const header =
    viewMode==="Actual"
      ? "🎯 Atención actual"
      : (partMode==="clientes"
          ? "🧭 Propuesta A/B/C (Clientes)"
          : "⚖️ Propuesta A/B/C (Volumen)");

  let html = `<h4>${header}</h4>`;
  html += `<div>${selectedDay} · Canal: ${escapeHtml(selectedCanal)}</div>`;

  html += `<div style="margin-top:8px; color:#9fb0c3;">Canales visibles</div>`;

  const keys = Object.keys(channelCounts).sort();
  if(keys.length===0){
    html += `<div class="row" style="color:#9fb0c3;">(Sin datos)</div>`;
  } else {
    for(const k of keys){
      const color = colorForChannel(k);
      html += `
        <div class="row">
          <span class="swatch" style="background:${color}"></span>
          ${escapeHtml(k)}
          <span class="pill">${channelCounts[k]} cl · ${compactNumber(channelVolumes[k])} kg</span>
        </div>
      `;
    }
  }

  legend.innerHTML = html;
}


/* ============================================================
   RENDER DISTRITOS (colores sólidos A/B/C y popups)
============================================================*/

function renderDistrictsColored(){

  districtsLayerHolder.clearLayers();
  if(!areaFeatures) return;

  const layer = L.geoJSON(areaFeatures,{
    pane:"zonesPane",
    style: f =>{
      const idx = f.properties.__idx;

      let p = null;
      if(viewMode==="Actual"){
        // no coloreamos por parte en Actual
        return {color:"#ef4444", weight:1, fillOpacity:0};
      } else {
        p = (partMode==="clientes"
              ? featurePartByIdx_clientes.get(idx)
              : featurePartByIdx_volumen.get(idx));
      }

      if(!p){
        return {color:"#ef4444", weight:1, fillOpacity:0};
      }

      const fill = partFill[p];
      const stroke = "#00000055";

      return {
        fillColor: fill,
        fillOpacity: 0.45,
        color: stroke,
        weight: 2
      };
    },

    onEachFeature: (f, polyLayer)=>{
      const idx = f.properties.__idx;
      const name = getFeatureDistName(f);

      polyLayer.bindTooltip(name, {direction:"auto", sticky:true});

      polyLayer.on("click", e=>{
        const sum = summarizeDistrict(idx);
        const html = `
          <div style="min-width:220px;">
            <div style="font-weight:700; margin-bottom:6px;">
              ${escapeHtml(name)}
            </div>

            <div>Total visibles: <strong>${sum.total}</strong></div>
            <div>A: <strong>${sum.A}</strong> · B: <strong>${sum.B}</strong> · C: <strong>${sum.C}</strong></div>
            <div>Carga total: <strong>${compactNumber(sum.carga)} kg</strong></div>
          </div>
        `;
        L.popup().setLatLng(e.latlng).setContent(html).openOn(map);
      });
    }
  });

  layer.addTo(districtsLayerHolder);
}


/* ============================================================
   RENDER MARCADORES
============================================================*/

function refreshLayers(){

  currentLayer.clearLayers();
  proposedLayer.clearLayers();

  const useAte = filterOffices.has("OFIC ATE");
  const useChorri = filterOffices.has("OFIC CHORRILLOS");

  function validOffice(o){
    return (o==="OFIC ATE" && useAte) || (o==="OFIC CHORRILLOS" && useChorri);
  }

  if(showMarkers){

    for(const r of records){

      if(!validOffice(normalize(r.office))) continue;
      if(selectedCanal!=="Todos" && normalize(r.canal)!==normalize(selectedCanal)) continue;
      if(filterZ3 && !r.hadZ3) continue;

      let pass = true;

      if(selectedDay!=="Todos"){
        if(viewMode==="Actual"){
          pass = r.days.includes(selectedDay);
        } else {
          pass = (partMode==="clientes"
                  ? (r.proposedDays ?? []).includes(selectedDay)
                  : (r.proposedVolDays ?? []).includes(selectedDay));
        }
      }
      if(!pass) continue;

      const marker = L.circleMarker([r.lat,r.lon],{
        pane:"markersPane",
        radius:5.6,
        color:"#0b1221",
        weight:1,
        fillColor: colorForChannel(r.canal ?? ""),
        fillOpacity:0.95
      }).bindPopup(buildPopUp(r));

      if(viewMode==="Actual"){
        currentLayer.addLayer(marker);
      } else {
        proposedLayer.addLayer(marker);
      }
    }
  }

  if(viewMode==="Actual"){
    if(!map.hasLayer(currentLayer)) map.addLayer(currentLayer);
    if(map.hasLayer(proposedLayer)) map.removeLayer(proposedLayer);
  } else {
    if(!map.hasLayer(proposedLayer)) map.addLayer(proposedLayer);
    if(map.hasLayer(currentLayer)) map.removeLayer(currentLayer);
  }

  renderDistrictsColored();
  renderLegend();
  fitToContent();
}


/* ============================================================
   AJUSTAR VISTA DE MAPA
============================================================*/

function fitToContent(){
  let bounds = null;
  const layers = [currentLayer, proposedLayer, boundaryLayer, districtsLayerHolder];

  for(const LYR of layers){
    const b = LYR.getBounds?.();
    if(b && b.isValid()){
      bounds = bounds ? bounds.extend(b) : b;
    }
  }

  if(bounds){
    map.fitBounds(bounds.pad(0.08));
  } else {
    map.setView([-12.0464, -77.0428], 10);
  }
}


/* ============================================================
   EXPORT CSV
============================================================*/

function getFilteredRows(){
  const useAte = filterOffices.has("OFIC ATE");
  const useChorri = filterOffices.has("OFIC CHORRILLOS");

  function validOffice(o){
    return (o==="OFIC ATE" && useAte) || (o==="OFIC CHORRILLOS" && useChorri);
  }

  const out = [];

  for(const r of records){

    if(!validOffice(normalize(r.office))) continue;
    if(selectedCanal!=="Todos" && normalize(r.canal)!==normalize(selectedCanal)) continue;
    if(filterZ3 && !r.hadZ3) continue;

    let pass = true;
    if(selectedDay!=="Todos"){
      pass = (viewMode==="Actual"
              ? r.days.includes(selectedDay)
              : (partMode==="clientes"
                  ? (r.proposedDays ?? []).includes(selectedDay)
                  : (r.proposedVolDays ?? []).includes(selectedDay)));
    }
    if(!pass) continue;

    out.push(r);
  }

  return out;
}

function csvEscape(v){
  const s=(v??"").toString();
  if(/[",\r\n]/.test(s)){
    return `"${s.replace(/"/g,'""')}"`;
  }
  return s;
}

document.getElementById("exportBtn").addEventListener("click",()=>{

  const rows = getFilteredRows();
  const header = [
    "Codigo","Nombre","Distrito_CSV","Distrito_Geo",
    "Freq_Actual","Prop_Clientes","Prop_Volumen",
    "Canal","Lat","Lon","Oficina","Vol_kg"
  ];

  const csv = [header.join(",")].concat(
    rows.map(r => [
      r.code,
      r.name,
      r.distrito,
      r.geoDistName,
      r.freqLetters ?? "",
      r.proposedLetters ?? "",
      r.proposedVolLetters ?? "",
      r.canal ?? "",
      r.lat,
      r.lon,
      r.office ?? "",
      r.volume ?? 0
    ].map(csvEscape).join(","))
  ).join("\r\n");

  const blob = new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const url  = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "ATEII_export.csv";
  a.click();
  URL.revokeObjectURL(url);
});

   EVENTOS UI
============================================================*/

document.getElementById("viewToggle").addEventListener("change", e=>{
  viewMode = e.target.checked ? "Propuesta" : "Actual";
  refreshLayers();
});

document.getElementById("dayFilter").addEventListener("click", e=>{
  if(e.target.tagName==="BUTTON"){
    document.querySelectorAll("#dayFilter button").forEach(btn=>btn.classList.remove("active"));
    e.target.classList.add("active");
    selectedDay = e.target.dataset.day;
    refreshLayers();
  }
});

document.getElementById("partChoice").addEventListener("click", e=>{
  if(e.target.tagName==="BUTTON"){
    document.querySelectorAll("#partChoice button").forEach(btn=>btn.classList.remove("active"));
    e.target.classList.add("active");
    partMode = e.target.dataset.mode;
    refreshLayers();
  }
});

document.getElementById("canalFilter").addEventListener("change", e=>{
  selectedCanal = e.target.value ?? "Todos";
  refreshLayers();
});

document.getElementById("oficAte").addEventListener("change", e=>{
  if(e.target.checked) filterOffices.add("OFIC ATE");
  else filterOffices.delete("OFIC ATE");
  refreshLayers();
});

document.getElementById("oficChorri").addEventListener("change", e=>{
  if(e.target.checked) filterOffices.add("OFIC CHORRILLOS");
  else filterOffices.delete("OFIC CHORRILLOS");
  refreshLayers();
});

document.getElementById("markersToggle").addEventListener("change", e=>{
  showMarkers = e.target.checked;
  refreshLayers();
});

document.getElementById("z3Toggle").addEventListener("change", e=>{
  filterZ3 = e.target.checked;
  refreshLayers();
});


})(); // end IIFE
