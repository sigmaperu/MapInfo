<script>
(function(){

/* SECTION: Core URLs */
const CSV_URL     = "https://raw.githubusercontent.com/sigmaperu/MapInfo/main/Catalogo%20Sigma.csv";
const VOL_URL     = "https://raw.githubusercontent.com/sigmaperu/MapInfo/main/Vol_Prom.csv";
const GEOJSON_URL = "https://raw.githubusercontent.com/sigmaperu/RoadMap/main/Distritos.geojson";

/* SECTION: Config */
const OFFICES = new Set(["OFIC ATE","OFIC CHORRILLOS"]);

<!-- FIN PARTE 2/20 -->

<!-- INICIO PARTE 3/20 (CORREGIDA) -->

/* SECTION: Exclusions */
const EXCLUDE_DISTRICTS = new Set([
  "ANCON","ANCÓN","MI PERU","MI PERÚ","SANTA ROSA",
  "VENTANILLA","PUENTE PIEDRA","CARABAYLLO"
].map(s => normalize(s)));

const EXCLUDE_CODES = new Set(["11747415","11604173","11747406","11684549"]);
const EXCLUDE_INTERLOC = "211087";
const PROPUESTA_BAJA_VAL = "PROPUESTA BAJA";

const MOD_EXCLUDE_KEYWORDS = [
  "Plaza vea","SPSA Makro","Economax","Supermercados Peruanos",
  "Mayorsa","Metro","Cencosud","Tottus","CD Huachipa",
  "Comidas gourmet","Delivery Hero","Ajiles","Solana"
].map(s => normalize(s));

/* SECTION: Days */
const dayLetterToName = { L:"Lunes", M:"Martes", X:"Miércoles", J:"Jueves", V:"Viernes", S:"Sábado" };
const dayNameToLetter = { "Lunes":"L","Martes":"M","Miércoles":"X","Jueves":"J","Viernes":"V","Sábado":"S" };
const orderDays = ["Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];

/* SECTION: Parts A/B/C */
const partToDays = {
  A:["Lunes","Jueves"],
  B:["Martes","Viernes"],
  C:["Miércoles","Sábado"]
};
const partToFreqLetters = { A:"LJ", B:"MV", C:"XS" };
const partColors = { A:"#5a76ff", B:"#30c48d", C:"#a56cff" };
const partFill   = { A:"#5a76ff", B:"#30c48d", C:"#a56cff" };

/* SECTION: App State */
let viewMode = "actual";
let selectedDay = "Todos";
let selectedCanal = "Todos";
let filterOffices = new Set(["OFIC ATE","OFIC CHORRILLOS"]);
let showMarkers = true;
let filterZ3 = false;

/* SECTION: Map Setup */
const map = L.map("map",{ preferCanvas:true, zoomControl:false });
L.control.zoom({ position:"bottomright" }).addTo(map);

map.createPane("zonesPane").style.zIndex = 300;
map.createPane("markersPane").style.zIndex = 600;

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
  attribution:"© OpenStreetMap"
}).addTo(map);

/* SECTION: Layers */
const currentLayer    = L.layerGroup().addTo(map);
const propuestaClie   = L.layerGroup();
const propuestaKg     = L.layerGroup();
const boundaryLayer   = L.geoJSON(null,{ pane:"zonesPane", style:{ color:"#ef4444", weight:1, fill:false }}).addTo(map);
const districtsLayer  = L.layerGroup().addTo(map);

/* SECTION: Data Containers */
let areaFeatures = null;
let records = [];
let volumenDict = {};
let neighbors = {};
let featurePart_Clientes = new Map();
let featurePart_Kg = new Map();

/* SECTION: Utils */

/* ✅ Fix: hasHeader() */
function hasHeader(row){
  const a = num(row[28]);
  const b = num(row[29]);
  const t28 = (row[28] ?? "").toString().toLowerCase();
  const t29 = (row[29] ?? "").toString().toLowerCase();
  if(!Number.isFinite(a) || !Number.isFinite(b)) return true;
  if(t28.includes("lat") || t29.includes("lon")) return true;
  return false;
}

function normalize(s){
  try{
    return (s ?? "")
      .toString()
      .normalize("NFD").replace(/\p{Diacritic}/gu,"")
      .toUpperCase().trim();
  }catch(e){
    return (s ?? "").toString().toUpperCase().trim();
  }
}

function normalizeName(s){
  return normalize(s).replace(/\s+/g," ");
}

function num(s){
  if(s == null) return NaN;
  const t = s.toString().replace(",",".");
  const v = parseFloat(t);
  return Number.isFinite(v) ? v : NaN;
}

function escapeHtml(str){
  return (str ?? "").toString()
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#39;");
}

function parseDays(raw){
  const s = (raw ?? "").toString().toUpperCase().replace(/[^LMXJVS]/g,"");
  const set = new Set();
  for(const ch of s){
    if(dayLetterToName[ch]) set.add(dayLetterToName[ch]);
  }
  return orderDays.filter(d => set.has(d));
}

function toFreqLetters(days){
  return orderDays.map(d => days.includes(d) ? dayNameToLetter[d] : "").join("");
}

function compactNumber(n){
  if(n >= 1_000_000) return (n/1_000_000).toFixed(1)+"M";
  if(n >= 1_000)     return (n/1_000).toFixed(1)+"k";
  return n.toString();
}

/* ✅ Fix: colorForChannel() */
const baseColors = [
  "#22c55e","#eab308","#06b6d4","#f97316",
  "#a855f7","#ef4444","#14b8a6","#f43f5e",
  "#84cc16","#e879f9","#60a5fa","#f59e0b",
  "#10b981","#8b5cf6"
];

let channelPalette = {};

function colorForChannel(canal){
  if(!canal) return "#6b7280";
  if(channelPalette[canal]) return channelPalette[canal];

  let h = 0;
  for(let i=0;i<canal.length;i++){
    h = (h*31 + canal.charCodeAt(i)) >>> 0;
  }
  const color = baseColors[h % baseColors.length];
  channelPalette[canal] = color;
  return color;
}

<!-- FIN PARTE 3/20 (CORREGIDA) -->
  
<!-- INICIO PARTE 4/20 -->

/* SECTION: GeoJSON District Name */
const DIST_KEYS = [
  "NOMBDIST","DISTRITO","DIST","NOMBRE","NAME",
  "nom_dist","nomdistr","distrito","Distrito",
  "NOMDIST","NOMBREDIST","NOMB_DIST"
];

function getFeatureDistName(f){
  const p = f?.properties ?? {};
  for(const k of DIST_KEYS){
    if(p[k] && typeof p[k] === "string" && p[k].trim().length){
      return p[k].trim();
    }
  }
  for(const k in p){
    if(typeof p[k] === "string" && p[k].trim().length){
      return p[k].trim();
    }
  }
  return "Distrito";
}

/* SECTION: Locate District Containing Point */
function getContainingFeature(lat, lon){
  if(!areaFeatures) return null;
  const pt = turf.point([lon, lat]);
  const feats = areaFeatures.features ?? [];
  for(let i=0;i<feats.length;i++){
    if(turf.booleanPointInPolygon(pt, feats[i])){
      return { idx:i, name:getFeatureDistName(feats[i]) };
    }
  }
  return null;
}

/* SECTION: District Contiguity (neighbors[]) */
function computeContiguity(){
  if(!areaFeatures || !areaFeatures.features) return;
  const feats = areaFeatures.features;
  const N = feats.length;

  for(let i=0;i<N;i++){ neighbors[i] = []; }

  for(let i=0;i<N;i++){
    for(let j=i+1;j<N;j++){
      try{
        if(turf.booleanIntersects(feats[i], feats[j])){
          neighbors[i].push(j);
          neighbors[j].push(i);
        }
      }catch(e){}
    }
  }

  for(let i=0;i<N;i++){
    neighbors[i] = Array.from(new Set(neighbors[i]));
  }
}

/* SECTION: Load Volumenes */
function ingestVolumenes(rows){
  for(let i=1;i<rows.length;i++){
    const row = rows[i];
    if(!row || row.length<2) continue;
    const code = (row[0] ?? "").toString().trim();
    const vol  = Number(row[1]) || 0;
    if(code) volumenDict[code] = vol;
  }
}

<!-- FIN PARTE 4/20 -->

<!-- INICIO PARTE 5/20 -->

/* SECTION: Ingest Catalog CSV */
function ingestRows(rows){
  const startIdx = hasHeader(rows[0]) ? 1 : 0;
  const prelim = [];

  for(let i=startIdx;i<rows.length;i++){
    const row = rows[i]; 
    if(!row) continue;

    const code = (row[0] ?? "").toString().trim();
    if(!code) continue;
    if(EXCLUDE_CODES.has(code)) continue;

    const name  = (row[7]  ?? "").toString().trim();
    const canal = (row[21] ?? "").toString().trim();
    const inter = (row[26] ?? "").toString().trim();
    const lat   = num(row[28]);
    const lon   = num(row[29]);
    const off   = (row[46] ?? "").toString().trim();
    const csvD  = (row[17] ?? "").toString().trim();

    if(!Number.isFinite(lat) || !Number.isFinite(lon)) continue;
    if(!OFFICES.has(normalize(off))) continue;

    const container = getContainingFeature(lat,lon);
    if(!container) continue;

    const geoName = container.name;
    if(EXCLUDE_DISTRICTS.has(normalize(geoName))) continue;

    const propFlag = (row[55] ?? "").toString().trim();
    if(normalize(propFlag) === PROPUESTA_BAJA_VAL) continue;

    if(inter === EXCLUDE_INTERLOC) continue;

    const canalNorm = normalize(canal);
    const nameNorm  = normalizeName(name);

    if(canalNorm === "MOD"){
      if(MOD_EXCLUDE_KEYWORDS.some(k => nameNorm.includes(k))) continue;
    }

    const daysRaw = (row[48] ?? "").toString().trim();
    const days    = parseDays(daysRaw);
    const freq    = toFreqLetters(days);
    const volKg   = volumenDict[code] ?? 0;

    prelim.push({
      code,
      name,
      canal,
      distrito: csvD,
      office: off,
      days,
      freqLetters:freq,
      lat,
      lon,
      featIdx: container.idx,
      geoDistName: geoName,
      hadZ3: days.length > 2,
      volume: volKg
    });
  }

  /* Deduplicate */
  const seen = new Set();
  const dedup = [];
  for(const r of prelim){
    const k = `${normalizeName(r.name)}_${r.lat.toFixed(6)}_${r.lon.toFixed(6)}`;
    if(seen.has(k)) continue;
    seen.add(k);
    dedup.push(r);
  }

  records = dedup;

  populateCanalFilter(records.map(r => r.canal).filter(Boolean));

  assignBalancedParts_Clientes();
  assignBalancedParts_Kg();

  refreshLayers();
}

/* SECTION: Populate Canal Filter */
function populateCanalFilter(canalList){
  const sel = document.getElementById("canalFilter");
  const uniq = Array.from(new Set(canalList));
  sel.innerHTML = 
    `<option value="Todos">Todos</option>` +
    uniq.sort().map(c =>
      `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`
    ).join("");
}

/* SECTION: Assign Proposal by Clients */
function assignBalancedParts_Clientes(){
  if(!records.length) return;

  const sorted = [...records].sort((a,b)=>a.lon - b.lon);
  const n = sorted.length;
  const size = Math.ceil(n/3);

  for(let i=0;i<n;i++){
    const r = sorted[i];
    r.partClie = (i < size) ? "A" : (i < size*2 ? "B" : "C");
    r.proposedClieDays    = partToDays[r.partClie];
    r.proposedClieLetters = partToFreqLetters[r.partClie];
  }

  const byFeat = new Map();
  for(const r of records){
    if(r.featIdx == null) continue;
    if(!byFeat.has(r.featIdx)) byFeat.set(r.featIdx,{A:0,B:0,C:0});
    byFeat.get(r.featIdx)[r.partClie]++;
  }

  featurePart_Clientes = new Map();
  for(const [idx,c] of byFeat){
    let best="A", max=-1;
    for(const p of ["A","B","C"]){
      if(c[p] > max){
        max=c[p];
        best=p;
      }
    }
    featurePart_Clientes.set(idx,best);
  }

  for(const r of records){
    const p = featurePart_Clientes.get(r.featIdx);
    if(p && r.partClie !== p){
      r.partClie = p;
      r.proposedClieDays    = partToDays[p];
      r.proposedClieLetters = partToFreqLetters[p];
    }
  }
}

<!-- FIN PARTE 5/20 -->

<!-- INICIO PARTE 6/20 -->

/* SECTION: Assign Proposal by KG (contiguous & balanced) */
function assignBalancedParts_Kg(){
  if(!records.length || !areaFeatures) return;

  const feats = areaFeatures.features;
  const N = feats.length;

  /* Volumen por distrito */
  const volPerDist = Array(N).fill(0);
  for(const r of records){
    if(r.featIdx != null){
      volPerDist[r.featIdx] += (r.volume ?? 0);
    }
  }

  /* Orden preliminar por centroide */
  const ordered = [...Array(N).keys()].sort((i,j)=>{
    const lonA = turf.centroid(feats[i]).geometry.coordinates[0];
    const lonB = turf.centroid(feats[j]).geometry.coordinates[0];
    return lonA - lonB;
  });

  /* Greedy inicial */
  let A=0,B=0,C=0;
  const distPart = Array(N).fill(null);

  for(const idx of ordered){
    const v = volPerDist[idx];
    if(A <= B && A <= C){ distPart[idx]="A"; A+=v; }
    else if(B <= A && B <= C){ distPart[idx]="B"; B+=v; }
    else { distPart[idx]="C"; C+=v; }
  }

  /* Contigüidad */
  function isContiguous(label){
    const nodes = [];
    for(let i=0;i<N;i++){
      if(distPart[i] === label) nodes.push(i);
    }
    if(nodes.length <= 1) return true;

    const visited = new Set([nodes[0]]);
    const queue = [nodes[0]];

    while(queue.length){
      const c = queue.shift();
      for(const nb of neighbors[c]){
        if(distPart[nb] === label && !visited.has(nb)){
          visited.add(nb);
          queue.push(nb);
        }
      }
    }

    return visited.size === nodes.length;
  }

  function loads(){
    return {
      A: distPart.reduce((s,p,i)=>p==="A"?s+volPerDist[i]:s,0),
      B: distPart.reduce((s,p,i)=>p==="B"?s+volPerDist[i]:s,0),
      C: distPart.reduce((s,p,i)=>p==="C"?s+volPerDist[i]:s,0)
    };
  }

  function diff(L){
    return Math.max(L.A,L.B,L.C) - Math.min(L.A,L.B,L.C);
  }

  function within(L){
    const avg = (L.A+L.B+L.C)/3;
    return diff(L) <= avg * 0.12;
  }

  /* Rebalance */
  let improving = true;
  while(improving){
    improving = false;
    const L = loads();
    if(within(L)) break;

    let big="A";
    if(L.B > L[big]) big="B";
    if(L.C > L[big]) big="C";

    const front = [];
    for(let i=0;i<N;i++){
      if(distPart[i] !== big) continue;
      for(const nb of neighbors[i]){
        if(distPart[nb] !== big){
          front.push(i);
          break;
        }
      }
    }

    for(const d of front){
      const v = volPerDist[d];
      const neighParts = new Set();
      for(const nb of neighbors[d]){
        if(distPart[nb] !== big){
          neighParts.add(distPart[nb]);
        }
      }

      for(const np of neighParts){
        const old = distPart[d];
        distPart[d] = np;

        if(!isContiguous(old) || !isContiguous(np)){
          distPart[d] = old;
          continue;
        }

        const newL = loads();
        if(diff(newL) < diff(L)){
          improving = true;
          break;
        } else {
          distPart[d] = old;
        }
      }

      if(improving) break;
    }
  }

  /* Asignar a clientes */
  featurePart_Kg = new Map();
  for(let i=0;i<N;i++){
    featurePart_Kg.set(i, distPart[i]);
  }

  for(const r of records){
    const p = featurePart_Kg.get(r.featIdx);
    r.partKg = p;
    r.proposedKgDays    = partToDays[p];
    r.proposedKgLetters = partToFreqLetters[p];
  }
}

/* SECTION: Popup for Clients */
function buildPopUp(r){

  const freqClie = r.proposedClieLetters ?? "—";

  const daysKg   = (r.proposedKgDays ?? []).join(", ");

  return `
    <div style="min-width:260px;">
      <div class="popup-line" style="font-weight:700; font-size:14px;">

      </div>

      <div class="popup-line"><strong>Nombre:</strong> ${escapeHtml(r.name)}</div>

      <div class="popup-line">

      </div>

      <div class="popup-line">
        <strong>Prop Kg:</strong>
        <span class="freq">${freqKg}</span>
        <span class="popup-muted">(${daysKg})</span>
      </div>

      <div class="popup-line" style="margin-top:6px;">
        ${gm}
      </div>
    </div>

/* SECTION: District Summary Popup */
function summarizeDistrict(idx){
  const useAte    = filterOffices.has("OFIC ATE");
  const useChorri = filterOffices.has("OFIC CHORRILLOS");

  const validOffice = o =>
    (o==="OFIC ATE" && useAte) ||
    (o==="OFIC CHORRILLOS" && useChorri);

  const out = { total:0, A:0, B:0, C:0, carga:0 };

  for(const r of records){

    if(r.featIdx !== idx) continue;
    if(!validOffice(normalize(r.office))) continue;
    if(selectedCanal!=="Todos" && normalize(r.canal)!==normalize(selectedCanal)) continue;
    if(filterZ3 && !r.hadZ3) continue;

    let pass=true;

    if(selectedDay !== "Todos"){
      if(viewMode === "actual")        pass = r.days.includes(selectedDay);
      else if(viewMode === "clie")     pass = (r.proposedClieDays ?? []).includes(selectedDay);
      else if(viewMode === "kg")       pass = (r.proposedKgDays ?? []).includes(selectedDay);
    }

    if(!pass) continue;

    out.total++;
    const p = (viewMode==="actual") ? null :
              (viewMode==="clie" ? r.partClie : r.partKg);

    if(p && out[p] !== undefined) out[p]++;
    out.carga += (r.volume ?? 0);
  }

  return out;
}

/* SECTION: Legend Rendering */
function renderLegend(){
  const legend = document.getElementById("legend");
  const channelCounts  = {};
  const channelVolumes = {};

  const useAte    = filterOffices.has("OFIC ATE");
  const useChorri = filterOffices.has("OFIC CHORRILLOS");

  const validOffice = o =>
    (o==="OFIC ATE" && useAte) ||
    (o==="OFIC CHORRILLOS" && useChorri);

  for(const r of records){

    if(!validOffice(normalize(r.office))) continue;
    if(selectedCanal!=="Todos" && normalize(r.canal)!==normalize(selectedCanal)) continue;
    if(filterZ3 && !r.hadZ3) continue;

    let pass = true;

    if(selectedDay !== "Todos"){
      if(viewMode === "actual")        pass = r.days.includes(selectedDay);
      else if(viewMode === "clie")     pass = (r.proposedClieDays ?? []).includes(selectedDay);
      else if(viewMode === "kg")       pass = (r.proposedKgDays ?? []).includes(selectedDay);
    }

    if(!pass) continue;

    const c = r.canal || "Sin canal";
    channelCounts[c]  = (channelCounts[c]  ?? 0) + 1;
    channelVolumes[c] = (channelVolumes[c] ?? 0) + (r.volume ?? 0);
  }

  const header =
    viewMode === "actual" ? "🎯 Actual" :
    viewMode === "clie"   ? "🧭 Prop Clie" :
                            "⚖️ Prop Kg";

  let html = `<h4>${header}</h4>`;
  html += `<div>${selectedDay} · Canal: ${escapeHtml(selectedCanal)}</div>`;
  html += `<div style="margin-top:6px;color:#9fb0c3;">Canales visibles</div>`;

  const keys = Object.keys(channelCounts).sort();
  if(keys.length === 0){
    html += `<div class="row" style="color:#9fb0c3;">(Sin datos)</div>`;
  } else {
    for(const k of keys){
      const clr = colorForChannel(k);
      html += `
        <div class="row">
          <span class="swatch" style="background:${clr}"></span>
          ${escapeHtml(k)}
          <span class="pill">${channelCounts[k]} · ${compactNumber(channelVolumes[k])} kg</span>
        </div>`;
    }
  }

  legend.innerHTML = html;
}

/* SECTION: Draw District Polygons */
function renderDistricts(){
  districtsLayer.clearLayers();
  if(!areaFeatures) return;

  const layer = L.geoJSON(areaFeatures,{

    pane:"zonesPane",

    style: f => {
      const idx = f.properties.__idx;
      let p = null;

      if(viewMode === "actual"){
        return { color:"#ef4444", weight:1, fillOpacity:0 };
      }

      p = (viewMode==="clie")
          ? featurePart_Clientes.get(idx)
          : featurePart_Kg.get(idx);

      if(!p){
        return { color:"#ef4444", weight:1, fillOpacity:0 };
      }

      return {
        fillColor: partFill[p],
        fillOpacity: 0.38,
        color:"#00000050",
        weight:1.4
      };
    },

    onEachFeature:(f,poly)=>{
      const idx = f.properties.__idx;
      const name = getFeatureDistName(f);

      poly.bindTooltip(name,{direction:"auto",sticky:true});

      poly.on("click",e=>{
        const s = summarizeDistrict(idx);
        const h = `
          <div style="min-width:200px;">
            <div style="font-weight:700;margin-bottom:4px;">${escapeHtml(name)}</div>
            <div>Total: <strong>${s.total}</strong></div>
            <div>A: <strong>${s.A}</strong> · B: <strong>${s.B}</strong> · C: <strong>${s.C}</strong></div>
            <div>Kg: <strong>${compactNumber(s.carga)}</strong></div>
          </div>
        `;
        L.popup().setLatLng(e.latlng).setContent(h).openOn(map);
      });
    }
  });

  layer.addTo(districtsLayer);
}

    if(selectedCanal!=="Todos" && normalize(r.canal)!==normalize(selectedCanal)) continue;
    if(filterZ3 && !r.hadZ3) continue;

    let pass=true;
    if(selectedDay !== "Todos"){
      if(viewMode==="actual") pass = r.days.includes(selectedDay);
      else if(viewMode==="clie") pass = (r.proposedClieDays ?? []).includes(selectedDay);

/* SECTION: Full Layer Refresh */
function refreshLayers(){
  refreshMarkers();
  renderDistricts();
  renderLegend();
  fitToContent();
}

/* SECTION: Fit Map to Visible Content */
function fitToContent(){
  let bounds = null;

  const layers = [
    currentLayer,
    propuestaClie,
    propuestaKg,
    boundaryLayer,
    districtsLayer
  ];

  for(const LYR of layers){
    if(!map.hasLayer(LYR)) continue;
    const b = LYR.getBounds?.();
    if(b && b.isValid()){
      bounds = bounds ? bounds.extend(b) : b;
    }
  }

  if(bounds){
    map.fitBounds(bounds.pad(0.08));
  } else {
    map.setView([-12.0464, -77.0428], 10);
  }
}

/* SECTION: CSV Export */
function csvEscape(v){
  const s = (v ?? "").toString();
  return /[",\r\n]/.test(s) ? `"${s.replace(/"/g,'""')}"` : s;
}

function getFilteredRowsForExport(){
  const out = [];

  const useAte    = filterOffices.has("OFIC ATE");
  const useChorri = filterOffices.has("OFIC CHORRILLOS");

  const validOffice = o =>
    (o==="OFIC ATE" && useAte) ||
    (o==="OFIC CHORRILLOS" && useChorri);

  for(const r of records){

    if(!validOffice(normalize(r.office))) continue;
    if(selectedCanal!=="Todos" && normalize(r.canal)!==normalize(selectedCanal)) continue;
    if(filterZ3 && !r.hadZ3) continue;

    let pass = true;
    if(selectedDay !== "Todos"){
      if(viewMode==="actual")      pass = r.days.includes(selectedDay);
      else if(viewMode==="clie")   pass = (r.proposedClieDays ?? []).includes(selectedDay);
      else                         pass = (r.proposedKgDays ?? []).includes(selectedDay);
    }

    if(!pass) continue;

    out.push(r);
  }

  return out;
}

document.getElementById("exportBtn").addEventListener("click",()=>{
  const rows = getFilteredRowsForExport();

  const header = [
    "Codigo","Nombre","Distrito_CSV","Distrito_Geo",
    "Freq_Actual","Prop_Clie","Prop_Kg",
    "Canal","Lat","Lon","Oficina","Vol_kg"
  ];

  const csv = [header.join(",")].concat(
    rows.map(r => [
      r.code,
      r.name,
      r.distrito,
      r.geoDistName,
      r.freqLetters,
      r.proposedClieLetters ?? "",
      r.proposedKgLetters ?? "",
      r.canal,
      r.lat,
      r.lon,
      r.office,
      r.volume ?? 0
    ].map(csvEscape).join(","))
  ).join("\r\n");

  const blob = new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");

  a.href = url;
  a.download = "ATEII_2026_export.csv";
  a.click();

  URL.revokeObjectURL(url);
});

/* SECTION: Load All (Volumen + Distritos + CSV) */
function loadAll(){

  Papa.parse(VOL_URL,{
    download:true,
    skipEmptyLines:true,
    complete:(volData)=>{

      ingestVolumenes(volData.data);

      fetch(GEOJSON_URL)
        .then(r=>r.json())
        .then(geo=>{

          areaFeatures = (geo && geo.type==="FeatureCollection")
            ? geo
            : { type:"FeatureCollection", features:[geo] };

          areaFeatures.features.forEach((f,i)=>{
            if(!f.properties) f.properties = {};
            f.properties.__idx = i;
          });

          boundaryLayer.addData(areaFeatures);

          computeContiguity();

          Papa.parse(CSV_URL,{
            download:true,
            skipEmptyLines:true,
            complete:(cat)=>{
              ingestRows(cat.data);
            }
          });

        });
    }
  });
}
