<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ATEII – Atención actual vs propuestas</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6.5.0/turf.min.js"></script>

<style>
 :root{
  --md-bg:#0b0f14;
  --md-surface:#0f1520;
  --md-surface-2:#121a26;
  --md-outline:#243245;
  --md-text:#e6edf3;
  --md-muted:#9fb0c3;
  --md-primary:#7c4dff;
  --md-secondary:#03dac6;
  --chip-bg:#0d1522;
  --elev: 0 2px 10px rgba(0,0,0,.35), 0 1px 2px rgba(0,0,0,.25);
 }
 *{ box-sizing:border-box }
 body{
  margin:0; font-family: Inter, system-ui, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
  background:var(--md-bg); color:var(--md-text);
 }
 header{
  position:sticky; top:0; z-index:1000;
  padding:8px 10px; border-bottom:1px solid var(--md-outline);
  display:flex; gap:10px; align-items:center; flex-wrap:wrap;
  background:linear-gradient(180deg, #0b0f14 0%, #0f1520 100%); box-shadow:var(--elev);
 }
 h1{ font-size:15px; margin:0; letter-spacing:.2px; font-weight:700; }
 .muted{ color:var(--md-muted); font-size:11px; }
 .controls{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
 .group{
  display:flex; gap:6px; align-items:center; padding:6px 8px;
  background:var(--md-surface-2); border:1px solid var(--md-outline); border-radius:10px;
 }
 .segmented{
  display:flex; overflow:hidden; border-radius:9px; border:1px solid var(--md-outline); background:var(--chip-bg);
 }
 .segmented button{
  background:transparent; color:var(--md-text); border:0; padding:5px 8px; cursor:pointer; font-weight:700; font-size:12px;
 }
 .segmented button.active{ background:var(--md-primary); color:#0a0716; }
 .segmented button + button{ border-left:1px solid var(--md-outline); }
 label.switch{ display:inline-flex; align-items:center; gap:6px; cursor:pointer; user-select:none; font-weight:600; font-size:12px;}
 .toggle{
  width:44px; height:24px; background:#0b1320; border:1px solid var(--md-outline); border-radius:999px; position:relative; transition:.2s;
 }
 .knob{ width:20px; height:20px; background:#fff; border-radius:50%; position:absolute; top:1.5px; left:1.5px; transition:.2s; box-shadow:0 1px 2px rgba(0,0,0,.5);} 
 input[type="checkbox"].toggle-input{ display:none; }
 input[type="checkbox"].toggle-input:checked + .toggle{ background:var(--md-secondary); }
 input[type="checkbox"].toggle-input:checked + .toggle .knob{ left:22px; }
 .select{
  appearance:none; background:#0b1320; border:1px solid var(--md-outline); color:var(--md-text); padding:6px 8px; border-radius:9px;
  font-weight:600; font-size:12px;
 }
 .btn{
  padding:6px 10px; border:1px solid var(--md-outline); background:#1a2030;
  color:#dcd3ff; border-radius:9px; cursor:pointer; font-weight:700; letter-spacing:.3px; font-size:12px;
 }
 .btn:hover{ filter:brightness(1.12); }
 #map{ height: calc(100vh - 86px); }
 .legend{
  position:absolute; bottom:12px; left:12px; z-index:600; background:rgba(15,21,32,.94);
  border:1px solid var(--md-outline); border-radius:12px; padding:10px; font-size:12px; max-width:460px; box-shadow:var(--elev);
  backdrop-filter: blur(8px);
 }
 .legend h4{ margin:0 0 4px 0; font-size:12px; }
 .legend .row{ display:flex; align-items:center; gap:6px; margin:4px 0; flex-wrap:wrap;}
 .swatch{ width:12px; height:12px; border-radius:2px; border:1px solid #0003; }
 .pill{ font-size:10px; padding:2px 6px; border:1px solid var(--md-outline); border-radius:999px; color:var(--md-muted); background:var(--chip-bg);} 
 a, a:visited{ color:#93c5fd; text-decoration:none; }
 a:hover{ text-decoration:underline; }
 .freq{
  display:inline-block; font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
  font-weight:800; font-size:12px; background:#0b1221; color:#c7d2fe; padding:2px 6px; border-radius:6px; border:1px solid #111827; 
 }
 .popup-line{ margin:3px 0; }
 .popup-muted{ color:#9CA3AF; }
 .leaflet-tooltip { background:#101826; color:#dbe7f3; border:1px solid #223144; border-radius:10px; box-shadow:var(--elev); }
 .leaflet-control-container .leaflet-bottom.leaflet-right { right: 16px; bottom: 16px; }
</style>
</head>
<body>
<header>
  <div style="display:flex; flex-direction:column; gap:2px;">
    <h1>ATEII · Mapa de atención</h1>
    <div class="muted">CSV: Catálogo Sigma + Volumen · GeoJSON distritos</div>
  </div>
  <div class="controls">
    <div class="group">
      <strong style="font-size:11px;">Vista:</strong>
      <div id="viewTabs" class="segmented" role="tablist" aria-label="Vista">
        <button data-view="Actual" class="active">Actual</button>
        <button data-view="PropClie">Prop. Clie</button>
        <button data-view="PropKg">Prop. Kg</button>
      </div>
    </div>
    <div class="group">
      <strong style="font-size:11px;">Día:</strong>
      <div id="dayFilter" class="segmented" role="tablist" aria-label="Filtro de día">
        <button data-day="Todos" class="active">Todos</button>
        <button data-day="Lunes">L</button>
        <button data-day="Martes">M</button>
        <button data-day="Miércoles">X</button>
        <button data-day="Jueves">J</button>
        <button data-day="Viernes">V</button>
        <button data-day="Sábado">S</button>
      </div>
    </div>
    <div class="group">
      <strong style="font-size:11px;">Canal:</strong>
      <select id="canalFilter" class="select" title="Filtrar por canal">
        <option value="Todos">Todos</option>
      </select>
    </div>
    <div class="group">
      <strong style="font-size:11px;">Oficina:</strong>
      <label><input type="checkbox" id="oficAte" checked> <span class="pill">Ofic Ate</span></label>
      <label><input type="checkbox" id="oficChorri" checked> <span class="pill">Ofic Chorrillos</span></label>
    </div>
    <div class="group">
      <label class="switch" title="Mostrar/Ocultar marcadores">
        <span>Marcadores</span>
        <input id="markersToggle" class="toggle-input" type="checkbox" checked/>
        <span class="toggle"><span class="knob"></span></span>
      </label>
    </div>
    <div class="group" title="Mostrar solo clientes con más de 2 días actuales">
      <label class="switch">
        <span>+Z3</span>
        <input id="z3Toggle" class="toggle-input" type="checkbox"/>
        <span class="toggle"><span class="knob"></span></span>
      </label>
    </div>
    <div class="group">
      <button id="exportBtn" class="btn" title="Exportar CSV (respeta filtros activos)">Exportar CSV</button>
    </div>
  </div>
</header>

<div id="map" role="application" aria-label="Mapa Leaflet de atención a clientes"></div>
<div class="legend" id="legend"></div>

<script>
(function(){
  const CSV_URL = "https://raw.githubusercontent.com/sigmaperu/MapInfo/main/Catalogo%20Sigma.csv";
  const VOL_URL = "https://raw.githubusercontent.com/sigmaperu/MapInfo/main/Vol_Prom.csv";
  const GEOJSON_URL = "https://raw.githubusercontent.com/sigmaperu/RoadMap/main/Distritos.geojson";

  const OFFICES = new Set(["OFIC ATE","OFIC CHORRILLOS"]);
  const EXCLUDE_DISTRICTS = new Set([
    "ANCON","ANCÓN","MI PERU","MI PERÚ","SANTA ROSA","VENTANILLA","PUENTE PIEDRA","CARABAYLLO"
  ].map(s => normalize(s)));
  const EXCLUDE_CODES = new Set(["11747415","11604173","11747406","11684549"]);
  const EXCLUDE_INTERLOC = "211087";
  const PROPUESTA_BAJA_VAL = "PROPUESTA BAJA";
  const MOD_EXCLUDE_KEYWORDS = [
    "Plaza vea","SPSA Makro","Economax","Supermercados Peruanos","Mayorsa",
    "Metro","Cencosud","Tottus","CD Huachipa","Comidas gourmet","Delivery Hero","Ajiles","Solana"
  ].map(s => normalize(s));

  const dayLetterToName = { "L":"Lunes", "M":"Martes", "X":"Miércoles", "J":"Jueves", "V":"Viernes", "S":"Sábado" };
  const dayNameToLetter = { "Lunes":"L", "Martes":"M", "Miércoles":"X", "Jueves":"J", "Viernes":"V", "Sábado":"S" };
  const orderDays = ["Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
  const partToDays = { "A":["Lunes","Jueves"], "B":["Martes","Viernes"], "C":["Miércoles","Sábado"] };
  const partToFreqLetters = { "A":"LJ", "B":"MV", "C":"XS" };

  // Paleta más distinguible
  const partColors = { A:"#2563eb", B:"#f59e0b", C:"#ec4899" };
  const partFill   = { A:"#60a5fa", B:"#fbbf24", C:"#f472b6" };

  // Ajustes de optimización
  const KG_WEIGHT = 1.0;
  const CLIENT_WEIGHT = 8.0;      // antes estaba implícitamente muy alto; ahora es más suave
  const KG_PRIORITY_FACTOR = 1.15; // favorece cambios que mejoran kg con claridad
  const MAX_ITERS = 40;
  const ENABLE_AUDIT = true;

  let viewMode = "Actual";
  let selectedDay = "Todos";
  let selectedCanal = "Todos";
  let filterOffices = new Set(["OFIC ATE","OFIC CHORRILLOS"]);
  let showMarkers = true;
  let filterZ3 = false;

  const map = L.map('map', { preferCanvas:true, zoomControl:false });
  L.control.zoom({ position: 'bottomright' }).addTo(map);
  map.createPane('zonesPane'); map.getPane('zonesPane').style.zIndex = 300;
  map.createPane('markersPane'); map.getPane('markersPane').style.zIndex = 600;
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution:'© OpenStreetMap' }).addTo(map);
  const currentLayer = L.layerGroup().addTo(map);
  const proposedLayer = L.layerGroup();
  const boundaryLayer = L.geoJSON(null, { pane:'zonesPane', style: { color:'#ef4444', weight:1, fill:false } }).addTo(map);
  const districtsLayerHolder = L.layerGroup().addTo(map);

  let areaFeatures = null;
  let records = [];
  let featurePartByIdxClie = new Map();
  let featurePartByIdxKg = new Map();
  let kgByCode = new Map();
  let adjacency = new Map();
  let districtStats = new Map();

  const audit = {
    adjacencyCount: [],
    moved: [],
    rejectedNoAdj: [],
    rejectedConnectivity: [],
    rejectedNoImprove: [],
    initialTotals: null,
    finalTotals: null
  };

function normalize(s){
  return (s ?? "")
    .toString()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .toUpperCase()
    .trim();
}
  function normalizeName(s){ return normalize(s).replace(/s+/g,' '); }
  function num(s){ if (s == null) return NaN; const t = s.toString().replace(",", "."); const v = parseFloat(t); return Number.isFinite(v) ? v : NaN; }

  function hasHeader(row){
    const a = num(row[28]), b = num(row[29]);
    const t28 = (row[28] ?? "").toString().toLowerCase();
    const t29 = (row[29] ?? "").toString().toLowerCase();
    if (!Number.isFinite(a) || !Number.isFinite(b)) return true;
    if (t28.includes("lat") || t29.includes("lon")) return true;
    return false;
  }

  function parseDays(raw){
    const s = (raw ?? "").toString().toUpperCase().replace(/[^LMXJVS]/g,"");
    const set = new Set();
    for (const ch of s) if (dayLetterToName[ch]) set.add(dayLetterToName[ch]);
    return orderDays.filter(d => set.has(d));
  }

  function toFreqLetters(dayArr){
    return ["Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"]
      .map(n => dayArr.includes(n) ? dayNameToLetter[n] : "").join("");
  }

  const DIST_KEYS = ["NOMBDIST","DISTRITO","DIST","NOMBRE","NAME","nom_dist","nomdistr","distrito","Distrito","NOMDIST","NOMBREDIST","NOMB_DIST"];
  function getFeatureDistName(f){
    const p = f?.properties || {};
    for (const k of DIST_KEYS){ if (p[k] && typeof p[k] === "string" && p[k].trim().length) return p[k].trim(); }
    for (const k in p){ if (typeof p[k] === "string" && p[k].trim().length) return p[k].trim(); }
    return "Distrito";
  }

  function getContainingFeature(lat, lon){
    if (!areaFeatures) return null;
    const pt = turf.point([lon, lat]);
    const feats = areaFeatures.features || [];
    for (let i=0; i<feats.length; i++){
      const f=feats[i];
      if (turf.booleanPointInPolygon(pt, f)) return { idx:i, name:getFeatureDistName(f) };
    }
    return null;
  }

  const baseColors = ["#22c55e","#eab308","#06b6d4","#f97316","#a855f7","#ef4444","#14b8a6","#f43f5e","#84cc16","#e879f9","#60a5fa","#f59e0b","#10b981","#8b5cf6"];
  const channelPalette = {};
  function colorForChannel(canal){
    if (!canal) return "#6b7280";
    if (channelPalette[canal]) return channelPalette[canal];
    let h=0; for(let i=0;i<canal.length;i++) h=(h*31 + canal.charCodeAt(i))>>>0;
    const color = baseColors[h % baseColors.length];
    channelPalette[canal] = color; return color;
  }

  function escapeHtml(str) {
    return (str ?? "").toString()
      .replace(/&/g, "&amp;")
      .replace(/</g,  "&lt;")
      .replace(/>/g,  "&gt;")
      .replace(/"/g,  "&quot;")
      .replace(/'/g,  "&#39;");
  }

  function isValidOffice(office){
    const oNorm = normalize(office);
    return (
      (oNorm === "OFIC ATE" && filterOffices.has("OFIC ATE")) ||
      (oNorm === "OFIC CHORRILLOS" && filterOffices.has("OFIC CHORRILLOS"))
    );
  }

  function passesZ3(r){ return !(filterZ3 && !r.hadZ3); }

  function getProposalFields(r){
    if (viewMode === "PropClie"){
      return { part: r.partClie, proposedDays: r.proposedDaysClie, proposedLetters: r.proposedLettersClie };
    }
    if (viewMode === "PropKg"){
      return { part: r.partKg, proposedDays: r.proposedDaysKg, proposedLetters: r.proposedLettersKg };
    }
    return { part:null, proposedDays:[], proposedLetters:"" };
  }

  function buildPopUp(r){
    const gm = `https://www.google.com/maps?q=${r.lat},${r.lon}`;
    const prop = getProposalFields(r);
    const proposedDaysStr = (prop.proposedDays && prop.proposedDays.length) ? prop.proposedDays.join(", ") : "—";
    const partDays = prop.part ? (partToDays[prop.part]?.join(" & ")) : "—";
    const distShown = r.geoDistName || r.distrito || "—";
    const freqNow = r.freqLetters || "—";
    const freqProp = prop.proposedLetters || "—";
    const kgStr = (r.kg && r.kg > 0) ? `${r.kg.toFixed(1)} kg prom.` : "Sin dato";
    let lblProp = "Propuesta";
    if (viewMode === "PropClie") lblProp = "Prop. Clie";
    if (viewMode === "PropKg") lblProp = "Prop. Kg";
    return `
      <div style="min-width:275px; line-height:1.3;">
        <div class="popup-line" style="font-weight:800; font-size:14px;">Cliente: ${escapeHtml(r.code)}</div>
        <div class="popup-line"><strong>Nombre:</strong> ${escapeHtml(r.name || "")}</div>
        <div class="popup-line"><strong>Canal:</strong> ${escapeHtml(r.canal || "")}</div>
        <div class="popup-line"><strong>Distrito:</strong> ${escapeHtml(distShown)}</div>
        <div class="popup-line"><strong>Oficina:</strong> ${escapeHtml(r.office || "")}</div>
        <div class="popup-line"><strong>Kg promedio:</strong> ${kgStr}</div>
        <hr style="border:none;border-top:1px solid #1f2937; margin:6px 0;">
        <div class="popup-line"><strong>Frecuencia actual:</strong> <span class="freq">${freqNow}</span></div>
        <div class="popup-line"><strong>${lblProp}:</strong> <span class="freq">${freqProp}</span> <span class="popup-muted">(${escapeHtml(proposedDaysStr)})</span></div>
        <div class="popup-line"><strong>Parte:</strong> ${prop.part ?? "—"} <span class="popup-muted">(${escapeHtml(partDays)})</span></div>
        <div class="popup-line"><strong>Ruta:</strong> ${escapeHtml(r.route || "")}</div>
        <div class="popup-line" style="margin-top:6px;">
          <a href="${gm}" target="_blank" rel="noopener noreferrer">Abrir en Google Maps ↗</a>
        </div>
      </div>
    `;
  }

  function channelSummaryWithFilters(){
    const out = {};
    for (const r of records){
      if (!isValidOffice(r.office)) continue;
      if (selectedCanal !== "Todos" && normalize(r.canal) !== normalize(selectedCanal)) continue;
      if (!passesZ3(r)) continue;
      const pass = (selectedDay === "Todos") ? true :
        (viewMode === "Actual" ? r.days.includes(selectedDay) : (getProposalFields(r).proposedDays || []).includes(selectedDay));
      if (!pass) continue;
      const key = r.canal || "Sin canal";
      if (!out[key]) out[key] = {count:0, kg:0};
      out[key].count++;
      out[key].kg += (r.kg || 0);
    }
    return out;
  }

  function partSummaryWithFilters(){
    const res = { A:{count:0,kg:0}, B:{count:0,kg:0}, C:{count:0,kg:0} };
    if (viewMode === "Actual") return res;
    for (const r of records){
      if (!isValidOffice(r.office)) continue;
      if (selectedCanal !== "Todos" && normalize(r.canal) !== normalize(selectedCanal)) continue;
      if (!passesZ3(r)) continue;
      const prop = getProposalFields(r);
      if (prop.part && res[prop.part]){
        res[prop.part].count++;
        res[prop.part].kg += (r.kg || 0);
      }
    }
    return res;
  }

  function daySummaryWithFilters(){
    const res = { L:{count:0,kg:0}, M:{count:0,kg:0}, X:{count:0,kg:0}, J:{count:0,kg:0}, V:{count:0,kg:0}, S:{count:0,kg:0} };
    for (const r of records){
      if (!isValidOffice(r.office)) continue;
      if (selectedCanal !== "Todos" && normalize(r.canal) !== normalize(selectedCanal)) continue;
      if (!passesZ3(r)) continue;
      const dayArr = (viewMode === "Actual") ? r.days : (getProposalFields(r).proposedDays || []);
      for (const d of dayArr){
        const letter = dayNameToLetter[d];
        if (letter && res[letter]){
          res[letter].count++;
          res[letter].kg += (r.kg || 0);
        }
      }
    }
    return res;
  }

  const legendEl = document.getElementById('legend');
  function renderLegend(){
    const channelSummary = channelSummaryWithFilters();
    const items = Object.keys(channelSummary).sort().map(canal => {
      const color = colorForChannel(canal);
      const info = channelSummary[canal];
      return `<div class="row">
        <span class="swatch" style="background:${color}"></span>
        ${escapeHtml(canal)}
        <span class="pill">${info.count} clientes</span>
        <span class="pill">${info.kg.toFixed(0)} kg</span>
      </div>`;
    }).join("");

    const partSummary = partSummaryWithFilters();
    const daySummary = daySummaryWithFilters();

    let header = "🎯 Atención actual";
    if (viewMode === "PropClie") header = "🧭 Propuesta clientes";
    if (viewMode === "PropKg") header = "⚖️ Propuesta Kg auditada";
    const z3 = filterZ3 ? `<span class="pill">+Z3</span>` : "";

    legendEl.innerHTML = `
      <h4>${header} ${z3}</h4>
      <div class="row">
        <span class="pill">Día filtro:</span> <span>${escapeHtml(selectedDay)}</span>
        <span class="pill">Canal:</span> <span>${escapeHtml(selectedCanal)}</span>
      </div>
      <div style="margin:6px 0 4px; color:#9fb0c3;">Canales visibles (afectados por filtros)</div>
      ${items || '<div class="row" style="color:#9fb0c3;">(Sin datos)</div>'}
      <div style="margin:8px 0 4px; color:#9fb0c3;">Resumen por parte (sin filtro de día)</div>
      <div class="row">
        <span class="pill" style="color:#dbeafe;border-color:#2563eb55;">A</span> ${partSummary.A.count} · ${partSummary.A.kg.toFixed(0)} kg
        <span class="pill" style="color:#fde68a;border-color:#f59e0b55;">B</span> ${partSummary.B.count} · ${partSummary.B.kg.toFixed(0)} kg
        <span class="pill" style="color:#fbcfe8;border-color:#ec489955;">C</span> ${partSummary.C.count} · ${partSummary.C.kg.toFixed(0)} kg
      </div>
      <div style="margin:8px 0 4px; color:#9fb0c3;">Resumen por día (sin filtro de día)</div>
      <div class="row">
        L: <span class="pill">${daySummary.L.count}</span> <span class="pill">${daySummary.L.kg.toFixed(0)} kg</span>
        M: <span class="pill">${daySummary.M.count}</span> <span class="pill">${daySummary.M.kg.toFixed(0)} kg</span>
        X: <span class="pill">${daySummary.X.count}</span> <span class="pill">${daySummary.X.kg.toFixed(0)} kg</span>
        J: <span class="pill">${daySummary.J.count}</span> <span class="pill">${daySummary.J.kg.toFixed(0)} kg</span>
        V: <span class="pill">${daySummary.V.count}</span> <span class="pill">${daySummary.V.kg.toFixed(0)} kg</span>
        S: <span class="pill">${daySummary.S.count}</span> <span class="pill">${daySummary.S.kg.toFixed(0)} kg</span>
      </div>
    `;
  }

  function fitToContent(){
    let bounds = null;
    const layers = [];
    if (map.hasLayer(currentLayer)) layers.push(currentLayer);
    if (map.hasLayer(proposedLayer)) layers.push(proposedLayer);
    if (map.hasLayer(boundaryLayer)) layers.push(boundaryLayer);
    if (map.hasLayer(districtsLayerHolder)) layers.push(districtsLayerHolder);
    for (const l of layers){
      const b = l.getBounds?.();
      if (b && b.isValid()) bounds = bounds ? bounds.extend(b) : b;
    }
    if (bounds && bounds.isValid()) map.fitBounds(bounds.pad(0.08));
    else map.setView([-12.0464, -77.0428], 10);
  }

  function renderDistrictsColoredByPart(){
    districtsLayerHolder.clearLayers();
    if (!areaFeatures) return;
    areaFeatures.features.forEach((f, i) => { if (!f.properties) f.properties = {}; f.properties.__idx = i; });

    const layer = L.geoJSON(areaFeatures, {
      pane:'zonesPane',
      style: (feature) => {
        const idx = feature.properties.__idx;
        let part = null;
        if (viewMode === "PropClie") part = featurePartByIdxClie.get(idx);
        else if (viewMode === "PropKg") part = featurePartByIdxKg.get(idx);
        if (part){
          return { color: partColors[part], weight: 2.2, fillColor: partFill[part], fillOpacity: 0.22 };
        }
        return { color:'#ef4444', weight:1, fillOpacity:0 };
      },
      onEachFeature: (feature, polygonLayer) => {
        const name = getFeatureDistName(feature);
        polygonLayer.bindTooltip(name, {direction:'auto', opacity:0.95, sticky:true, className:'district-tip', permanent:false});
      }
    });
    layer.addTo(districtsLayerHolder);
  }

  function refreshLayers(){
    currentLayer.clearLayers();
    proposedLayer.clearLayers();

    if (showMarkers){
      for (const r of records){
        if (!isValidOffice(r.office)) continue;
        if (selectedCanal !== "Todos" && normalize(r.canal) !== normalize(selectedCanal)) continue;
        if (filterZ3 && !r.hadZ3) continue;

        let dayPass = true;
        if (selectedDay !== "Todos"){
          if (viewMode === "Actual") dayPass = r.days.includes(selectedDay);
          else dayPass = (getProposalFields(r).proposedDays || []).includes(selectedDay);
        }
        if (!dayPass) continue;

        const color = colorForChannel(r.canal || "");
        const marker = L.circleMarker([r.lat, r.lon], {
          pane:'markersPane',
          radius:5.8, stroke:true, weight:1, color:"#0b1221",
          fillColor: color, fillOpacity:0.95
        }).bindPopup(buildPopUp(r));

        if (viewMode === "Actual") currentLayer.addLayer(marker);
        else proposedLayer.addLayer(marker);
      }
    }

    if (viewMode === "Actual"){
      if (!map.hasLayer(currentLayer)) currentLayer.addTo(map);
      if (map.hasLayer(proposedLayer)) map.removeLayer(proposedLayer);
    } else {
      if (!map.hasLayer(proposedLayer)) proposedLayer.addTo(map);
      if (map.hasLayer(currentLayer)) map.removeLayer(currentLayer);
    }

    renderDistrictsColoredByPart();
    renderLegend();
    fitToContent();
  }

  function populateCanalFilter(canalList){
    const sel = document.getElementById('canalFilter');
    const uniq = Array.from(new Set(canalList));
    sel.innerHTML = `<option value="Todos">Todos</option>` + uniq.sort().map(c=>`<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join("");
  }

  function buildDistrictStats(){
    districtStats = new Map();
    for (const r of records){
      if (r.featIdx == null) continue;
      if (!districtStats.has(r.featIdx)){
        districtStats.set(r.featIdx, {
          featIdx: r.featIdx,
          name: normalize(r.geoDistName),
          label: r.geoDistName,
          kg: 0,
          count: 0
        });
      }
      const d = districtStats.get(r.featIdx);
      d.kg += (r.kg || 0);
      d.count += 1;
    }
  }

  function assignPartsClie(){
    const sorted = [...records].sort((a,b)=>a.lon - b.lon);
    const n = sorted.length; if (n === 0) return;
    const size = Math.ceil(n / 3), cut1 = size, cut2 = size * 2;

    for (let i=0; i<n; i++){
      const r = sorted[i];
      r.partClie = (i < cut1) ? "A" : (i < cut2 ? "B" : "C");
      r.proposedDaysClie = partToDays[r.partClie];
      r.proposedLettersClie = partToFreqLetters[r.partClie];
    }

    const byFeat = new Map();
    for (const r of records){
      const k = r.featIdx;
      if (k == null) continue;
      if (!byFeat.has(k)) byFeat.set(k, {A:0,B:0,C:0});
      byFeat.get(k)[r.partClie] = (byFeat.get(k)[r.partClie] || 0) + 1;
    }

    featurePartByIdxClie = new Map();
    for (const [idx, counts] of byFeat){
      let maj="A", max=-1;
      for (const p of ["A","B","C"]) {
        if ((counts[p] || 0) > max){ max=(counts[p] || 0); maj=p; }
      }
      featurePartByIdxClie.set(idx, maj);
    }

    for (const r of records){
      const mj = featurePartByIdxClie.get(r.featIdx);
      if (mj){
        r.partClie = mj;
        r.proposedDaysClie = partToDays[mj];
        r.proposedLettersClie = partToFreqLetters[mj];
      }
    }
  }

  function buildAdjacency(){
    adjacency = new Map();
    audit.adjacencyCount = [];

    if (!areaFeatures?.features?.length) return;

    const feats = areaFeatures.features;
    for (let i=0; i<feats.length; i++) adjacency.set(i, new Set());

    for (let i=0; i<feats.length; i++){
      const fi = feats[i];
      const bi = turf.bbox(fi);

      for (let j=i+1; j<feats.length; j++){
        const fj = feats[j];
        const bj = turf.bbox(fj);

        const bboxOverlap = !(bi[2] < bj[0] || bj[2] < bi[0] || bi[3] < bj[1] || bj[3] < bi[1]);
        if (!bboxOverlap) continue;

        let isAdj = false;
        try {
          isAdj = turf.booleanTouches(fi, fj);
        } catch(e){}

        if (isAdj){
          adjacency.get(i).add(j);
          adjacency.get(j).add(i);
        }
      }
    }

    if (ENABLE_AUDIT){
      adjacency.forEach((set, idx) => {
        audit.adjacencyCount.push({
          idx,
          distrito: getFeatureDistName(areaFeatures.features[idx]),
          vecinos: set.size
        });
      });
    }
  }

  function getPartTotals(partMap){
    const totals = {
      A:{kg:0,count:0},
      B:{kg:0,count:0},
      C:{kg:0,count:0}
    };
    districtStats.forEach((d, idx) => {
      const p = partMap.get(idx);
      if (!p || !totals[p]) return;
      totals[p].kg += d.kg;
      totals[p].count += d.count;
    });
    return totals;
  }

  function scoreBreakdown(totals){
    const kgVals = [totals.A.kg, totals.B.kg, totals.C.kg];
    const ctVals = [totals.A.count, totals.B.count, totals.C.count];
    const kgSpread = Math.max(...kgVals) - Math.min(...kgVals);
    const ctSpread = Math.max(...ctVals) - Math.min(...ctVals);
    const score = (kgSpread * KG_WEIGHT * KG_PRIORITY_FACTOR) + (ctSpread * CLIENT_WEIGHT);
    return { kgSpread, ctSpread, score };
  }

  function getDistrictsOfPart(partMap, part){
    const arr = [];
    partMap.forEach((p, idx) => { if (p === part) arr.push(idx); });
    return arr;
  }

  function isConnectedPart(partMap, part){
    const nodes = getDistrictsOfPart(partMap, part);
    if (nodes.length <= 1) return true;

    const nodeSet = new Set(nodes);
    const visited = new Set();
    const stack = [nodes[0]];
    visited.add(nodes[0]);

    while (stack.length){
      const cur = stack.pop();
      const neigh = adjacency.get(cur) || new Set();
      neigh.forEach(n => {
        if (nodeSet.has(n) && !visited.has(n)){
          visited.add(n);
          stack.push(n);
        }
      });
    }
    return visited.size === nodeSet.size;
  }

  function canMoveDistrict(partMap, featIdx, fromPart, toPart){
    const neigh = adjacency.get(featIdx) || new Set();
    let touchesTo = false;
    neigh.forEach(n => {
      if (partMap.get(n) === toPart) touchesTo = true;
    });
    if (!touchesTo){
      audit.rejectedNoAdj.push({ featIdx, distrito: districtStats.get(featIdx)?.label || featIdx, fromPart, toPart });
      return false;
    }

    const trial = new Map(partMap);
    trial.set(featIdx, toPart);

    const ok = isConnectedPart(trial, fromPart) && isConnectedPart(trial, toPart);
    if (!ok){
      audit.rejectedConnectivity.push({ featIdx, distrito: districtStats.get(featIdx)?.label || featIdx, fromPart, toPart });
    }
    return ok;
  }

  function findDistrictByName(nameNorm){
    let found = null;
    districtStats.forEach((d, idx) => {
      if (d.name === nameNorm) found = { ...d, featIdx: idx };
    });
    return found;
  }

  function trySplitMirafloresSanIsidro(partMap){
    const mir = findDistrictByName("MIRAFLORES");
    const san = findDistrictByName("SAN ISIDRO");
    if (!mir || !san) return partMap;

    const pm = partMap.get(mir.featIdx);
    const ps = partMap.get(san.featIdx);
    if (pm !== ps) return partMap;

    const totals = getPartTotals(partMap);
    const options = ["A","B","C"]
      .filter(p => p !== pm)
      .sort((a,b)=>totals[a].kg - totals[b].kg);

    for (const target of options){
      const lighter = (mir.kg <= san.kg) ? mir : san;
      if (canMoveDistrict(partMap, lighter.featIdx, pm, target)){
        const trial = new Map(partMap);
        trial.set(lighter.featIdx, target);
        audit.moved.push({
          distrito: lighter.label,
          fromPart: pm,
          toPart: target,
          reason: "Split Miraflores/San Isidro"
        });
        return trial;
      }
    }
    return partMap;
  }

  function optimizeKgFromClie(){
    audit.moved = [];
    audit.rejectedNoAdj = [];
    audit.rejectedConnectivity = [];
    audit.rejectedNoImprove = [];

    featurePartByIdxKg = new Map(featurePartByIdxClie);
    audit.initialTotals = getPartTotals(featurePartByIdxKg);

    featurePartByIdxKg = trySplitMirafloresSanIsidro(featurePartByIdxKg);

    let improved = true;
    let guard = 0;

    while (improved && guard < MAX_ITERS){
      improved = false;
      guard++;

      const totals = getPartTotals(featurePartByIdxKg);
      const base = scoreBreakdown(totals);
      const sortedParts = ["A","B","C"].sort((a,b)=>totals[b].kg - totals[a].kg || totals[b].count - totals[a].count);
      const heavy = sortedParts[0];

      let bestMove = null;

      districtStats.forEach((d, featIdx) => {
        const fromPart = featurePartByIdxKg.get(featIdx);
        if (fromPart !== heavy) return;

        const neighParts = new Set();
        (adjacency.get(featIdx) || new Set()).forEach(n => {
          const p = featurePartByIdxKg.get(n);
          if (p && p !== fromPart) neighParts.add(p);
        });

        neighParts.forEach(toPart => {
          if (!canMoveDistrict(featurePartByIdxKg, featIdx, fromPart, toPart)) return;

          const trial = new Map(featurePartByIdxKg);
          trial.set(featIdx, toPart);

          const trialTotals = getPartTotals(trial);
          const next = scoreBreakdown(trialTotals);

          const improvesKgClearly = next.kgSpread < base.kgSpread;
          const scoreImproves = next.score < base.score;
          const clientsNotTooWorse = next.ctSpread <= (base.ctSpread + 1);

          if ((scoreImproves || (improvesKgClearly && clientsNotTooWorse))){
            const delta = base.score - next.score;
            const candidate = {
              featIdx,
              distrito: d.label,
              fromPart,
              toPart,
              delta,
              base,
              next,
              trial
            };
            if (!bestMove || candidate.delta > bestMove.delta || (candidate.next.kgSpread < bestMove.next.kgSpread)){
              bestMove = candidate;
            }
          } else {
            audit.rejectedNoImprove.push({
              distrito: d.label,
              fromPart,
              toPart,
              baseScore: +base.score.toFixed(2),
              nextScore: +next.score.toFixed(2),
              baseKgSpread: +base.kgSpread.toFixed(2),
              nextKgSpread: +next.kgSpread.toFixed(2),
              baseCtSpread: base.ctSpread,
              nextCtSpread: next.ctSpread
            });
          }
        });
      });

      if (bestMove){
        featurePartByIdxKg = bestMove.trial;
        audit.moved.push({
          distrito: bestMove.distrito,
          fromPart: bestMove.fromPart,
          toPart: bestMove.toPart,
          reason: "Optimize Kg + soft clients",
          baseScore: +bestMove.base.score.toFixed(2),
          nextScore: +bestMove.next.score.toFixed(2),
          baseKgSpread: +bestMove.base.kgSpread.toFixed(2),
          nextKgSpread: +bestMove.next.kgSpread.toFixed(2),
          baseCtSpread: bestMove.base.ctSpread,
          nextCtSpread: bestMove.next.ctSpread
        });
        improved = true;
      }
    }

    audit.finalTotals = getPartTotals(featurePartByIdxKg);

    for (const r of records){
      const p = featurePartByIdxKg.get(r.featIdx) || r.partClie || "A";
      r.partKg = p;
      r.proposedDaysKg = partToDays[p];
      r.proposedLettersKg = partToFreqLetters[p];
    }

    if (ENABLE_AUDIT){
      console.group("AUDITORIA PROP. KG");
      console.log("PARAMS", { KG_WEIGHT, CLIENT_WEIGHT, KG_PRIORITY_FACTOR, MAX_ITERS });
      console.log("TOTALS CLIE/INITIAL", audit.initialTotals);
      console.log("TOTALS KG/FINAL", audit.finalTotals);
      console.table(audit.adjacencyCount.sort((a,b)=>a.vecinos-b.vecinos));
      console.table(audit.moved);
      console.table(audit.rejectedNoAdj.slice(0, 100));
      console.table(audit.rejectedConnectivity.slice(0, 100));
      console.table(audit.rejectedNoImprove.slice(0, 100));
      console.groupEnd();
    }
  }

  function ingestRows(rows){
    const startIdx = hasHeader(rows[0]) ? 1 : 0;
    const prelim = [];
    for (let i=startIdx; i<rows.length; i++){
      const row = rows[i]; if (!row) continue;
      const code = (row[0] ?? "").toString().trim();
      if (!code || EXCLUDE_CODES.has(code)) continue;

      const route = (row[12] ?? "").toString().trim();
      const name = (row[7] ?? "").toString().trim();
      const canal = (row[21] ?? "").toString().trim();
      const interloc = (row[26] ?? "").toString().trim();
      const lat = num(row[28]), lon = num(row[29]);
      if (!Number.isFinite(lat) || !Number.isFinite(lon)) continue;

      const office = (row[46] ?? "").toString().trim();
      const officeNorm = normalize(office);
      if (!OFFICES.has(officeNorm)) continue;

      const container = getContainingFeature(lat, lon);
      if (!container) continue;

      const geoDistName = container.name;
      const geoDistNorm = normalize(geoDistName);
      if (EXCLUDE_DISTRICTS.has(geoDistNorm)) continue;

      const propuestaFlag = (row[55] ?? "").toString().trim();
      if (normalize(propuestaFlag) === PROPUESTA_BAJA_VAL) continue;
      if (interloc === EXCLUDE_INTERLOC) continue;

      const canalNorm = normalize(canal);
      const nameNorm = normalizeName(name);
      if (canalNorm === "MOD"){
        const hit = MOD_EXCLUDE_KEYWORDS.some(k => nameNorm.includes(k));
        if (hit) continue;
      }

      const csvDistrito = (row[17] ?? "").toString().trim();
      const daysRaw = (row[48] ?? "").toString().trim();
      const days = parseDays(daysRaw);
      const freqLetters = toFreqLetters(days);
      const kg = kgByCode.get(code) || 0;

      prelim.push({
        code, name, canal, canalNorm, distrito: csvDistrito, office, route,
        daysRaw, days, freqLetters, lat, lon,
        featIdx: container.idx, geoDistName,
        hadZ3: days.length > 2,
        kg,
        partClie:null, proposedDaysClie:[], proposedLettersClie:"",
        partKg:null, proposedDaysKg:[], proposedLettersKg:""
      });
    }

    const seen = new Set(); const deduped = [];
    for (const r of prelim){
      const key = `${normalizeName(r.name||"")}${r.lat.toFixed(6)}${r.lon.toFixed(6)}`;
      if (seen.has(key)) continue;
      seen.add(key);
      deduped.push(r);
    }

    records = deduped;
    populateCanalFilter(records.map(r=>r.canal).filter(Boolean));
    buildDistrictStats();
    assignPartsClie();
    optimizeKgFromClie();
    refreshLayers();
  }

  document.getElementById('exportBtn').addEventListener('click', ()=>{
    const rows = getFilteredRowsForExport();
    const headers = [
      "Codigo Cliente","Nombre Cliente","Distrito Catalogo","Distrito GeoJson",
      "Frecuencia Actual","Frecuencia Prop Clie","Frecuencia Prop Kg",
      "Canal","Ruta","Latitud","Longitud","Oficina","Kg_Prom",
      "Parte_Clie","Parte_Kg"
    ];
const csv = [
  headers.join(",")
].concat(
  rows.map(r => [
    r.code,
    r.name,
    r.distrito,
    r.geoDistName,
    r.freqLetters ?? "",
    r.proposedClieLetters ?? "",
    r.proposedKgLetters ?? "",
    r.canal ?? "",
    r.route ?? "",
    r.lat,
    r.lon,
    r.office ?? "",
    r.volume ?? 0,      // antes estaba r.kg
    r.partClie ?? "",
    r.partKg ?? ""
  ].map(csvEscape).join(","))
).join("\r\n");
    const blob = new Blob([csv], {type:"text/csv;charset=utf-8;"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "ATEII_export.csv"; a.click();
    URL.revokeObjectURL(url);
  });

  function getFilteredRowsForExport(){
    const out = [];
    for (const r of records){
      if (!isValidOffice(r.office)) continue;
      if (selectedCanal !== "Todos" && normalize(r.canal) !== normalize(selectedCanal)) continue;
      if (filterZ3 && !r.hadZ3) continue;
      const pass = (selectedDay === "Todos") ? true :
        (viewMode === "Actual" ? r.days.includes(selectedDay) : (getProposalFields(r).proposedDays || []).includes(selectedDay));
      if (!pass) continue;
      out.push(r);
    }
    return out;
  }

function csvEscape(v){
  const s = (v ?? "").toString();
  return /[",\r\n]/.test(s)
    ? `"${s.replace(/"/g,'""')}"`
    : s;
}

  document.getElementById('viewTabs').addEventListener('click', (e)=>{
    if (e.target.tagName === "BUTTON"){
      document.querySelectorAll('#viewTabs button').forEach(b=>b.classList.remove('active'));
      e.target.classList.add('active');
      viewMode = e.target.dataset.view || "Actual";
      refreshLayers();
    }
  });

  document.getElementById('dayFilter').addEventListener('click', (e)=>{
    if (e.target.tagName === "BUTTON"){
      document.querySelectorAll('#dayFilter button').forEach(b=>b.classList.remove('active'));
      e.target.classList.add('active');
      selectedDay = e.target.dataset.day;
      refreshLayers();
    }
  });

  document.getElementById('canalFilter').addEventListener('change', (e)=>{ selectedCanal = e.target.value || "Todos"; refreshLayers(); });
  document.getElementById('oficAte').addEventListener('change', (e)=>{ if (e.target.checked) filterOffices.add("OFIC ATE"); else filterOffices.delete("OFIC ATE"); refreshLayers(); });
  document.getElementById('oficChorri').addEventListener('change', (e)=>{ if (e.target.checked) filterOffices.add("OFIC CHORRILLOS"); else filterOffices.delete("OFIC CHORRILLOS"); refreshLayers(); });
  document.getElementById('markersToggle').addEventListener('change', (e)=>{ showMarkers = e.target.checked; refreshLayers(); });
  document.getElementById('z3Toggle').addEventListener('change', (e)=>{ filterZ3 = e.target.checked; refreshLayers(); });

  fetch(GEOJSON_URL)
    .then(r => r.json())
    .then(geo => {
      areaFeatures = (geo && geo.type === "FeatureCollection") ? geo : { type:"FeatureCollection", features: [geo] };
      areaFeatures.features.forEach((f,i)=>{ if(!f.properties) f.properties={}; f.properties.__idx=i; });
      boundaryLayer.addData(areaFeatures);
      buildAdjacency();
      try { const b=boundaryLayer.getBounds(); if (b && b.isValid()) map.fitBounds(b.pad(0.05)); } catch(e){}

      Papa.parse(VOL_URL, {
        download:true, dynamicTyping:false, skipEmptyLines:true,
        complete: (vRes) => {
          const vRows = vRes.data || [];
          const vStart = (vRows[0] && isNaN(num(vRows[0][1]))) ? 1 : 0;
          for (let i=vStart; i<vRows.length; i++){
            const row = vRows[i]; if (!row) continue;
            const code = (row[0] ?? "").toString().trim();
            if (!code) continue;
            const kgVal = num(row[1]);
            if (Number.isFinite(kgVal)) kgByCode.set(code, kgVal);
          }

          Papa.parse(CSV_URL, {
            download:true, dynamicTyping:false, skipEmptyLines:true,
            complete: (results) => {
              const rows=results.data;
              if (!rows || !rows.length){ alert("No se pudo leer el CSV o está vacío."); return; }
              ingestRows(rows);
            },
            error: (err) => { console.error(err); alert("Error al descargar o parsear el CSV de catálogo."); }
          });
        },
        error: (err) => {
          console.error(err);
          alert("Error al descargar Vol_Prom.csv. Se asignarán kg = 0.");
          Papa.parse(CSV_URL, {
            download:true, dynamicTyping:false, skipEmptyLines:true,
            complete: (results) => {
              const rows=results.data;
              if (!rows || !rows.length){ alert("No se pudo leer el CSV o está vacío."); return; }
              ingestRows(rows);
            }
          });
        }
      });
    })
    .catch(err => {
      console.error("No se pudo cargar el GeoJSON:", err);
      alert("No se pudo cargar el GeoJSON de límites.");
    });
})();
