<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ATEII – Atención actual vs propuesta</title>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- PapaParse (CSV) -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<!-- MarkerCluster (mejor rendimiento con muchos puntos) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<style>
  :root{
    --bg:#0f172a;          /* slate-900 */
    --card:#111827;        /* gray-900 */
    --muted:#94a3b8;       /* slate-400 */
    --text:#e5e7eb;        /* gray-200 */
    --line:#1f2937;        /* gray-800 */
    --brand:#60a5fa;       /* blue-400 */
  }
  body{
    margin:0; font-family:system-ui, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    background:var(--bg); color:var(--text);
  }
  header{
    padding:10px 14px; border-bottom:1px solid var(--line);
    display:flex; gap:14px; align-items:center; flex-wrap:wrap;
    background:linear-gradient(180deg, #0b1221 0%, #0f172a 100%);
    position:sticky; top:0; z-index:500;
  }
  h1{ font-size:16px; margin:0; letter-spacing:.2px; }
  .muted{ color:var(--muted); font-size:12px; }
  .controls{
    display:flex; gap:10px; align-items:center; flex-wrap:wrap;
  }
  .group{ display:flex; gap:6px; align-items:center; padding:6px 8px; background:var(--card); border:1px solid var(--line); border-radius:10px; }
  .segmented{
    display:flex; overflow:hidden; border-radius:8px; border:1px solid var(--line);
  }
  .segmented button{
    background:#0b1221; color:var(--text); border:0; padding:6px 10px; cursor:pointer; font-weight:600;
  }
  .segmented button.active{ background:var(--brand); color:#0b1221; }
  .segmented button + button{ border-left:1px solid var(--line); }
  label.switch{ display:inline-flex; align-items:center; gap:8px; cursor:pointer; user-select:none; }
  .toggle{
    width:44px; height:24px; background:#111827; border:1px solid var(--line); border-radius:999px; position:relative; transition:.2s;
  }
  .knob{ width:20px; height:20px; background:white; border-radius:50%; position:absolute; top:1px; left:1px; transition:.2s; }
  input#viewToggle{ display:none; }
  input#viewToggle:checked + .toggle{ background:#16a34a; }
  input#viewToggle:checked + .toggle .knob{ left:23px; }
  #map{ height: calc(100vh - 92px); }
  .legend{
    position:absolute; bottom:12px; left:12px; z-index:400; background:var(--card);
    border:1px solid var(--line); border-radius:10px; padding:10px; font-size:13px;
  }
  .legend h4{ margin:0 0 6px 0; font-size:13px; }
  .legend .row{ display:flex; align-items:center; gap:8px; margin:4px 0; }
  .swatch{ width:12px; height:12px; border-radius:2px; border:1px solid #0003; }
  .pill{ font-size:11px; padding:2px 6px; border:1px solid var(--line); border-radius:999px; color:var(--muted);}
  a, a:visited{ color:#93c5fd; text-decoration:none; }
  a:hover{ text-decoration:underline; }
  .btn{ padding:6px 10px; border:1px solid var(--line); background:var(--card); color:var(--text); border-radius:8px; cursor:pointer;}
  .freq{ display:inline-block; font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; font-weight:700; font-size:12px; background:#0b1221; color:#c7d2fe; padding:2px 6px; border-radius:6px; border:1px solid #111827;}
</style>
</head>
<body>

<header>
  <div style="display:flex; flex-direction:column;">
    <h1>ATEII · Mapa de atención</h1>
    <div class="muted">
      Fuente CSV: 
      <a href="https://raw.githubusercontent.com/sigmaperu/MapInfo/main/Catalogo%20Sigma.csv" target="_blank" rel="noopener">
        Catalogo Sigma (raw)
      </a>
    </div>
  </div>

  <div class="controls">
    <div class="group">
      <label class="switch" title="Cambiar entre Atención actual y Propuesta">
        <span>Actual</span>
        <input id="viewToggle" type="checkbox" />
        <span class="toggle"><span class="knob"></span></span>
        <span>Propuesta</span>
      </label>
    </div>

    <div class="group">
      <strong style="font-size:12px;">Día:</strong>
      <div id="dayFilter" class="segmented" role="tablist" aria-label="Filtro de día">
        <button data-day="Todos" class="active">Todos</button>
        <button data-day="Lunes">L</button>
        <button data-day="Martes">M</button>
        <button data-day="Miércoles">X</button>
        <button data-day="Jueves">J</button>
        <button data-day="Viernes">V</button>
        <button data-day="Sábado">S</button>
      </div>
    </div>

    <div class="group">
      <strong style="font-size:12px;">Oficinas:</strong>
      <label><input type="checkbox" id="oficAte" checked> <span class="pill">Ofic Ate</span></label>
      <label><input type="checkbox" id="oficChorri" checked> <span class="pill">Ofic Chorrillos</span></label>
    </div>

    <div class="group">
      <button id="fitBtn" class="btn" title="Ajustar a puntos visibles">Ajustar vista</button>
    </div>
  </div>
</header>

<div id="map" role="application" aria-label="Mapa Leaflet de atención a clientes"></div>

<div class="legend" id="legend"></div>

<script>
(function(){
  const RAW_URL = "https://raw.githubusercontent.com/sigmaperu/MapInfo/main/Catalogo%20Sigma.csv";

  // ====== Catálogos y configuración ======
  const OFFICES = new Set(["OFIC ATE","OFIC CHORRILLOS"]);

  // Lista inclusiva de distritos (Lima + Callao) provista por Marco
  const INCLUDE_DISTRICTS_LIST = [
    "LIMA","ATE","BARRANCO","BREÑA","CHACLACAYO","CHORRILLOS","CIENEGUILLA","COMAS","EL AGUSTINO",
    "INDEPENDENCIA","JESUS MARIA","LA MOLINA","LA VICTORIA","LINCE","LOS OLIVOS","LURIGANCHO","LURIN",
    "MAGDALENA DEL MAR","MAGDALENA VIEJA","MIRAFLORES","PACHACAMAC","PUCUSANA","PUNTA HERMOSA","PUNTA NEGRA",
    "RIMAC","SAN BARTOLO","SAN BORJA","SAN ISIDRO","SAN JUAN DE LURIGANCHO","SAN JUAN DE MIRAFLORES","SAN LUIS",
    "SAN MARTIN DE PORRES","SAN MIGUEL","SANTA ANITA","SANTA MARIA DEL MAR","SANTA ROSA","SANTIAGO DE SURCO",
    "SURQUILLO","VILLA EL SALVADOR","VILLA MARIA DEL TRIUNFO",
    "CALLAO","BELLAVISTA","CARMEN DE LA LEGUA REYNOSO","LA PERLA","LA PUNTA"
  ];
  const INCLUDE_DISTRICTS = new Set(INCLUDE_DISTRICTS_LIST.map(s => normalize(s)));

  // Mapeo de letras a nombres y viceversa (X = Miércoles)
  const dayLetterToName = { "L":"Lunes", "M":"Martes", "X":"Miércoles", "J":"Jueves", "V":"Viernes", "S":"Sábado" };
  const dayNameToLetter = { "Lunes":"L", "Martes":"M", "Miércoles":"X", "Jueves":"J", "Viernes":"V", "Sábado":"S" };

  // Colores por día (vista "Actual")
  const dayColors = {
    "Lunes":"#2563eb",     // azul
    "Martes":"#16a34a",    // verde
    "Miércoles":"#7c3aed", // morado
    "Jueves":"#f59e0b",    // naranja
    "Viernes":"#0ea5e9",   // celeste
    "Sábado":"#dc2626"     // rojo
  };

  // Partición propuesta (longitud terciles)
  const partToDays = { "A":["Lunes","Jueves"], "B":["Martes","Viernes"], "C":["Miércoles","Sábado"] };
  const partToFreqLetters = { "A":"LJ", "B":"MV", "C":"XS" };
  const partColors = { "A":"#1f78b4", "B":"#33a02c", "C":"#6a3d9a" };

  // ====== Estado UI ======
  let viewMode = "Actual";            // "Actual" | "Propuesta"
  let selectedDay = "Todos";          // "Todos" o nombre de día
  let filterOffices = new Set(["OFIC ATE","OFIC CHORRILLOS"]);

  // ====== Mapa ======
  const map = L.map('map', { preferCanvas:true });
  const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution:'&copy; OpenStreetMap'
  }).addTo(map);

  const clusterOptions = { showCoverageOnHover:false, disableClusteringAtZoom:16, spiderfyOnMaxZoom:true };
  let currentLayer = L.markerClusterGroup(clusterOptions);
  let proposedLayer = L.markerClusterGroup(clusterOptions);

  currentLayer.addTo(map);

  // ====== Datos ======
  let records = []; // {code,distrito,office,daysRaw,days[],freqLetters,lat,lon,part,proposedDays[],proposedLetters}

  // ====== Utilitarios ======
  function normalize(s){ return (s ?? "").toString().normalize("NFD").replace(/\p{Diacritic}/gu, "").toUpperCase().trim(); }
  function num(s){
    if (s == null) return NaN;
    const t = s.toString().replace(",", "."); // por si viniera coma decimal
    const v = parseFloat(t);
    return Number.isFinite(v) ? v : NaN;
  }
  function hasHeader(row){
    const a = num(row[28]), b = num(row[29]);
    const t28 = (row[28] ?? "").toString().toLowerCase();
    const t29 = (row[29] ?? "").toString().toLowerCase();
    if (!Number.isFinite(a) || !Number.isFinite(b)) return true;
    if (t28.includes("lat") || t29.includes("lon")) return true;
    return false;
  }
  function parseDays(raw){
    const s = (raw ?? "").toString().toUpperCase().replace(/[^LMXJVS]/g,"");
    const set = new Set();
    for (const ch of s) if (dayLetterToName[ch]) set.add(dayLetterToName[ch]);
    return Array.from(set);
  }
  function toFreqLetters(dayArr){
    // Orden canónico L M X J V S
    const order = ["Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
    return order.map(n => dayArr.includes(n) ? dayNameToLetter[n] : "").join("");
  }
  function computeTertiles(vals){
    if (!vals.length) return {t1:0, t2:0};
    const s = [...vals].sort((a,b)=>a-b);
    const q = (p)=>{
      const pos = (s.length - 1) * p;
      const base = Math.floor(pos), rest = pos - base;
      if (s[base+1] !== undefined) return s[base] + rest * (s[base+1] - s[base]);
      return s[base];
    };
    return { t1: q(1/3), t2: q(2/3) };
  }
  function assignPart(lon,t1,t2){
    if (lon <= t1) return "A";  // Oeste
    if (lon <= t2) return "B";  // Centro
    return "C";                 // Este
  }

  // ====== Leyenda ======
  const legendEl = document.getElementById('legend');
  function renderLegend(){
    if (viewMode === "Actual") {
      legendEl.innerHTML = `
        <h4>🎯 Atención actual</h4>
        ${["Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"].map(d=>
          `<div class="row"><span class="swatch" style="background:${dayColors[d]}"></span> ${d}</div>`).join("")}
        <div class="row"><span class="pill">Filtro:</span> <span>${selectedDay}</span></div>
      `;
    } else {
      legendEl.innerHTML = `
        <h4>🧭 Atención propuesta (3 zonas por longitud)</h4>
        <div class="row"><span class="swatch" style="background:${partColors.A}"></span> Parte A → Lunes &amp; Jueves (LJ)</div>
        <div class="row"><span class="swatch" style="background:${partColors.B}"></span> Parte B → Martes &amp; Viernes (MV)</div>
        <div class="row"><span class="swatch" style="background:${partColors.C}"></span> Parte C → Miércoles &amp; Sábado (XS)</div>
        <div class="row"><span class="pill">Filtro:</span> <span>${selectedDay}</span></div>
      `;
    }
  }

  function fitToLayer(layer){
    const bounds = layer.getBounds();
    if (bounds && bounds.isValid()) map.fitBounds(bounds.pad(0.1));
    else map.setView([-12.0464, -77.0428], 10);
  }

  function buildPopUp(r){
    const gm = `https://www.google.com/maps?q=${r.lat},${r.lon}`;
    const proposedDaysStr = (r.proposedDays && r.proposedDays.length) ? r.proposedDays.join(", ") : "—";
    const partDays = r.part ? (partToDays[r.part]?.join(" & ")) : "—";
    return `
      <div style="min-width:240px">
        <div style="font-weight:700; font-size:14px; margin-bottom:6px;">Cliente: ${r.code}</div>
        <div><strong>Distrito:</strong> ${r.distrito}</div>
        <div><strong>Oficina:</strong> ${r.office}</div>
        <hr style="border:none;border-top:1px solid #1f2937; margin:6px 0;">
        <div><strong>Frecuencia actual:</strong> <span class="freq">${r.freqLetters || "—"}</span> <span style="color:#9CA3AF">(${r.days.join(", ") || "—"})</span></div>
        <div><strong>Propuesta:</strong> <span class="freq">${r.proposedLetters || "—"}</span> <span style="color:#9CA3AF">(${proposedDaysStr})</span></div>
        <div><strong>Parte:</strong> ${r.part ?? "—"} <span style="color:#9CA3AF">(${partDays})</span></div>
        <div style="margin-top:6px;"><a href="${gm}" target="_blank" rel="noopener">Abrir en Google Maps ↗</a></div>
      </div>
    `;
  }

  // ====== Render de capas ======
  function refreshLayers(){
    map.removeLayer(currentLayer);
    map.removeLayer(proposedLayer);
    currentLayer = L.markerClusterGroup(clusterOptions);
    proposedLayer = L.markerClusterGroup(clusterOptions);

    const useAte = filterOffices.has("OFIC ATE");
    const useChorri = filterOffices.has("OFIC CHORRILLOS");
    const validOffice = (oNorm) => ( (oNorm === "OFIC ATE" && useAte) || (oNorm === "OFIC CHORRILLOS" && useChorri) );

    for (const r of records){
      if (!validOffice(normalize(r.office))) continue;

      if (viewMode === "Actual"){
        // Filtro por día en la frecuencia actual
        let passes = (selectedDay === "Todos") ? r.days.length > 0 : r.days.includes(selectedDay);
        if (!passes) continue;

        // Color: si “Todos”, usa el 1er día; si no, el color del seleccionado
        const baseColor = (selectedDay === "Todos") ? (dayColors[r.days[0]] || "#6b7280") : (dayColors[selectedDay] || "#6b7280");

        const marker = L.circleMarker([r.lat, r.lon], {
          radius:6, stroke:true, weight:1, color:"#0b1221",
          fillColor: baseColor, fillOpacity:0.9
        }).bindPopup(buildPopUp(r));
        currentLayer.addLayer(marker);

      } else {
        // Filtro por día en la frecuencia propuesta
        let passes = (selectedDay === "Todos") ? true : (r.proposedDays?.includes(selectedDay));
        if (!passes) continue;

        const color = partColors[r.part] || "#6b7280";
        const marker = L.circleMarker([r.lat, r.lon], {
          radius:6, stroke:true, weight:1, color:"#0b1221",
          fillColor: color, fillOpacity:0.9
        }).bindPopup(buildPopUp(r));
        proposedLayer.addLayer(marker);
      }
    }

    if (viewMode === "Actual"){
      currentLayer.addTo(map);
      fitToLayer(currentLayer);
    } else {
      proposedLayer.addTo(map);
      fitToLayer(proposedLayer);
    }
    renderLegend();
  }

  // ====== Ingesta del CSV ======
  function ingestRows(rows){
    records = [];
    const startIdx = hasHeader(rows[0]) ? 1 : 0;

    for (let i=startIdx; i<rows.length; i++){
      const row = rows[i];
      if (!row) continue;
      const lat = num(row[28]);
      const lon = num(row[29]);
      if (!Number.isFinite(lat) || !Number.isFinite(lon)) continue;

      const office = (row[46] ?? "").toString().trim();
      const officeNorm = normalize(office);
      if (!OFFICES.has(officeNorm)) continue;

      const distrito = (row[17] ?? "").toString().trim();
      const distNorm = normalize(distrito);
      if (!INCLUDE_DISTRICTS.has(distNorm)) continue; // <<— Solo distritos de la lista

      const code = (row[0] ?? "").toString().trim();
      const daysRaw = (row[48] ?? "").toString().trim();
      const days = parseDays(daysRaw);
      const freqLetters = toFreqLetters(days);

      records.push({ code, distrito, office, daysRaw, days, freqLetters, lat, lon });
    }

    // Partición por longitudes: terciles → A (oeste), B (centro), C (este)
    const longitudes = records.map(r=>r.lon);
    const {t1, t2} = computeTertiles(longitudes);
    for (const r of records){
      r.part = assignPart(r.lon, t1, t2);
      r.proposedDays = partToDays[r.part] || [];
      r.proposedLetters = partToFreqLetters[r.part] || "";
    }

    // Centrar mapa
    if (records.length){
      const meanLat = records.reduce((a,r)=>a+r.lat,0)/records.length;
      const meanLon = records.reduce((a,r)=>a+r.lon,0)/records.length;
      map.setView([meanLat, meanLon], 11);
    } else {
      map.setView([-12.0464, -77.0428], 10);
    }

    refreshLayers();
  }

  // ====== Eventos UI ======
  const viewToggle = document.getElementById('viewToggle');
  viewToggle.addEventListener('change', ()=>{
    viewMode = viewToggle.checked ? "Propuesta" : "Actual";
    refreshLayers();
  });

  document.getElementById('dayFilter').addEventListener('click', (e)=>{
    if (e.target.tagName === "BUTTON"){
      document.querySelectorAll('#dayFilter button').forEach(b=>b.classList.remove('active'));
      e.target.classList.add('active');
      selectedDay = e.target.dataset.day;
      refreshLayers();
    }
  });

  document.getElementById('oficAte').addEventListener('change', (e)=>{
    if (e.target.checked) filterOffices.add("OFIC ATE"); else filterOffices.delete("OFIC ATE");
    refreshLayers();
  });
  document.getElementById('oficChorri').addEventListener('change', (e)=>{
    if (e.target.checked) filterOffices.add("OFIC CHORRILLOS"); else filterOffices.delete("OFIC CHORRILLOS");
    refreshLayers();
  });

  document.getElementById('fitBtn').addEventListener('click', ()=>{
    if (viewMode === "Actual") fitToLayer(currentLayer);
    else fitToLayer(proposedLayer);
  });

  // ====== Carga CSV ======
  Papa.parse(RAW_URL, {
    download:true,
    dynamicTyping:false,
    skipEmptyLines:true,
    complete: (results) => {
      const rows = results.data;
      if (!rows || !rows.length){
        alert("No se pudo leer el CSV o está vacío.");
        return;
      }
      ingestRows(rows);
    },
    error: (err) => {
      console.error(err);
      alert("Error al descargar o parsear el CSV.");
    }
  });

})();
</script>
</body>
</html>
